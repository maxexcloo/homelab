[env]
API_DATA_IS_SENSITIVE = "true"
RENDER_DIR = ".render"

[tools]
actionlint = "1.7.12"
hadolint = "2.14.0"
opentofu = "1.12.5"
prek = "0.4.10"
prettier = "3.9.6"
ruff = "0.16.0"
sops = "3.13.3"
uv = "0.11.32"

# Setup
[tasks.init]
description = "Initialize OpenTofu"
run = "tofu init"

[tasks.setup]
description = "Clean up, configure, initialize, and install Git hooks"
depends = ["cleanup"]
run = """
if [[ ! -f .mise.local.toml ]]; then
  cp .mise.local.toml.default .mise.local.toml
  echo "Created .mise.local.toml - please add your tokens"
  exit 1
fi
tofu init
prek install
"""

# Development
[tasks.check]
description = "Format check, lint, and validate"
depends = ["lint", "validate"]
run = """
prettier --check ".github/**/*.{yaml,yml}" "data/**/*.yml" "schemas/*.json" "templates/**/*.yml" ".pre-commit-config.yaml" "renovate.json"
ruff format --check modules scripts templates/workflows
"""

[tasks.cleanup]
description = "Remove rendered artifacts, caches, bytecode, and saved plans"
run = """
find . -path ./.git -prune -o \
  -type d \\( -name .render -o -name .ruff_cache -o -name .terraform -o -name __pycache__ \\) \
  -prune -exec rm -rf -- {} +
find . -path ./.git -prune -o \
  -type f \\( -name '*.plan' -o -name '*.pyc' -o -name '*.tfplan' \\) \
  -exec rm -f -- {} +
"""

[tasks.fmt]
description = "Format all files"
run = """
prettier --log-level warn --write ".github/**/*.{yaml,yml}" "data/**/*.yml" "schemas/*.json" "templates/**/*.yml" ".pre-commit-config.yaml" "renovate.json"
ruff check --fix --select I modules scripts templates/workflows
ruff format modules scripts templates/workflows
tofu fmt -recursive
"""

[tasks.lint]
description = "Validate source and default-merged YAML against JSON schemas"
depends = ["sort-check"]
run = """
ruff check --extend-select I modules scripts templates/workflows
uv run scripts/validate_data.py
"""

[tasks.prek]
description = "Run all repository hooks"
run = "prek run --all-files"

[tasks.validate]
description = "Check and validate OpenTofu configuration"
run = """
tofu fmt -check -recursive
tofu validate
"""

# Plan
[tasks.plan]
description = "Plan all changes"
run = "tofu plan"

[tasks.plan-servers]
description = "Plan server module changes"
run = "tofu plan -target=module.servers"

[tasks.plan-services]
description = "Plan service module changes"
run = "tofu plan -target=module.services"

# Deploy
[tasks.apply]
description = "Apply all changes"
run = 'tofu apply'

[tasks.apply-servers]
description = "Apply server module changes"
run = "tofu apply -target=module.servers"

[tasks.apply-services]
description = "Apply service module changes"
run = "tofu apply -target=module.services"

# Scripts
[tasks.render]
description = "Render plaintext deployment artifacts via debug_dir"
run = "tofu plan -refresh=false -var debug_dir=$RENDER_DIR"

[tasks.sort-check]
description = "Check HCL assignment grouping, JSON Schema, and YAML key ordering"
run = "uv run scripts/sort_check.py"
