[env]
API_DATA_IS_SENSITIVE = "true"
RENDER_DIR = ".render"
TF_CLI_ARGS_apply = "-parallelism=20"
TF_CLI_ARGS_plan = "-parallelism=20"

[tools]
"pipx:check-jsonschema" = "0.37.2"
opentofu = "1"
prettier = "3"
ruff = "0"
sops = "3"
uv = "0"

# Setup
[tasks.init]
description = "Initialize OpenTofu"
run = "tofu init"

[tasks.setup]
description = "Initial project setup"
run = """
# Setting up project...
if [[ ! -f .mise.local.toml ]]; then
  echo "Creating .mise.local.toml template..."
  cp .mise.local.toml.default .mise.local.toml
  echo "Created .mise.local.toml - please add your tokens"
  exit 1
fi
"""

# Development
[tasks.check]
description = "Format check, lint, and validate"
depends = ["lint", "validate"]
run = """
prettier --check "data/**/*.yml" "schemas/*.json" "templates/**/*.yml"
ruff format --check scripts modules templates/workflows
tofu fmt -check -recursive
"""

[tasks.fmt]
description = "Format all files"
run = """
prettier --log-level warn --write "data/**/*.yml" "schemas/*.json" "templates/**/*.yml"
ruff check --fix --select I scripts modules templates/workflows
ruff format scripts modules templates/workflows
tofu fmt -recursive
"""

[tasks.lint]
description = "Validate YAML data files against JSON schemas"
depends = ["sort-check"]
run = """
check-jsonschema --schemafile schemas/dns.json data/dns/*.yml
check-jsonschema --schemafile schemas/server.json data/servers/*.yml
check-jsonschema --schemafile schemas/service.json data/services/*.yml
check-jsonschema --schemafile schemas/config.json data/config.yml
check-jsonschema --schemafile schemas/defaults.json data/defaults.yml
ruff check --extend-select I scripts modules templates/workflows
"""

[tasks.validate]
description = "Validate configurations"
run = "tofu validate"

# Deployment
[tasks.apply]
description = "Apply all changes"
run = 'tofu apply'

[tasks.plan]
description = "Plan all changes"
run = "tofu plan"

[tasks.refresh]
description = "Check for configuration drift"
run = "tofu refresh"

# Scripts
[tasks.new-server]
description = "Create a new server YAML from defaults and open in $EDITOR"
run = "uv run scripts/new_server.py \"$@\""

[tasks.new-service]
description = "Create a new service YAML from defaults and open in $EDITOR"
run = "uv run scripts/new_service.py \"$@\""

[tasks.render]
description = "Render plaintext deployment artifacts via debug_dir"
run = "tofu plan -refresh=false -var debug_dir=$RENDER_DIR"

[tasks.sort-check]
description = "Check YAML and JSON Schema key ordering"
run = "uv run scripts/sort_check.py"
