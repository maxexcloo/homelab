# Docker label defaults for routing/dashboard tools. Keep product-specific logic
# here so Terraform only renders and merges labels.
%{ if service.networking.scheme != null ~}
homepage.description: ${jsonencode(service.identity.description)}
homepage.group: ${jsonencode(service.identity.group)}
%{ if service.fqdn_external != null ~}
homepage.href: ${jsonencode("https://${service.fqdn_external}")}
%{ else ~}
%{ if length(service.networking.urls) > 0 ~}
homepage.href: ${jsonencode("https://${service.networking.urls[0]}")}
%{ else ~}
%{ if service.fqdn_internal != null ~}
homepage.href: ${jsonencode("${service.networking.ssl ? "https" : "http"}://${service.fqdn_internal}")}
%{ endif ~}
%{ endif ~}
%{ endif ~}
homepage.icon: ${jsonencode(coalesce(service.identity.icon, service.identity.service))}
homepage.name: ${jsonencode(coalesce(service.identity.title, service.identity.name))}
%{ endif ~}
%{ if service.networking.port != null ~}
traefik.enable: "true"
%{ if !service.networking.ssl ~}
traefik.http.routers.${service.identity.service}.entrypoints: web
%{ endif ~}
%{ if service.networking.expose == "tailscale" ~}
traefik.http.routers.${service.identity.service}.middlewares: tailscale-only@docker
%{ endif ~}
%{ if service.networking.expose == "internal" ~}
traefik.http.routers.${service.identity.service}.middlewares: internal-only@docker
%{ endif ~}
traefik.http.services.${service.identity.service}.loadbalancer.server.port: ${jsonencode(tostring(service.networking.port))}
%{ if service.networking.scheme == "https" ~}
traefik.http.services.${service.identity.service}.loadbalancer.server.scheme: https
%{ endif ~}
traefik.http.routers.${service.identity.service}.rule: ${jsonencode(join(" || ", concat(
  service.fqdn_internal != null ? ["Host(`${service.fqdn_internal}`)"] : [],
  service.fqdn_external != null ? ["Host(`${service.fqdn_external}`)"] : [],
  [for url in service.networking.urls : "Host(`${url}`)"]
)))}
%{ endif ~}
%{ if service.networking.scheme == null && service.networking.port == null ~}
{}
%{ endif ~}
