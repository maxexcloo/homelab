name: Deploy

on:
  push:
    paths:
      - .github/deploy-request.json
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy or leave empty for all"

concurrency:
  cancel-in-progress: false
  group: deploy

permissions:
  contents: read

jobs:
  deployments:
    name: Select Deployments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.deployments.outputs.deployments }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Select Deployments
        id: deployments
        env:
          BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ inputs.service }}
        run: python3 .github/scripts/select-deployments.py

  deploy:
    if: needs.deployments.outputs.matrix != '[]'
    name: Deploy ${{ matrix.service }}
    needs: [deployments]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        service: ${{ fromJSON(needs.deployments.outputs.matrix) }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      SERVICE: ${{ matrix.service }}
      SOPS_AGE_KEY: ${{ secrets.AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.6
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Decrypt Files
        run: python3 ../.github/scripts/decrypt.py
      - name: Deploy
        run: python3 ../.github/scripts/deploy.py
