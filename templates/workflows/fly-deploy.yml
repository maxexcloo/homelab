name: Deploy

on:
  push:
    paths:
      - "**"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy or leave empty for all"
        required: false

concurrency:
  cancel-in-progress: true
  group: deploy

jobs:
  changed-files:
    name: Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Select Targets
        id: targets
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SERVICE: ${{ inputs.service }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_SERVICE" ]; then
            if ! printf '%s' "$INPUT_SERVICE" | grep -Eq '^[a-z0-9][a-z0-9-]*$'; then
              echo "Invalid service: $INPUT_SERVICE" >&2
              exit 1
            fi
            TARGETS=$(printf '%s\n' "$INPUT_SERVICE")
          else
            TARGETS=$(find . -maxdepth 1 -mindepth 1 -type d ! -name '.*' -printf '%f\n')
          fi
          printf '%s\n' "$TARGETS" | jq -Rsc '[split("\n")[] | select(test("^[^./][^/]*$"))]' | sed 's/^/targets=/' >> "$GITHUB_OUTPUT"

  deploy:
    if: needs.changed-files.outputs.matrix != '[]'
    name: Deploy
    needs: [changed-files]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changed-files.outputs.matrix) }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      SERVICE: ${{ matrix.service }}
      SOPS_AGE_KEY: ${{ secrets.AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Decrypt Files
        run: find . -type f | xargs grep -l 'BEGIN AGE ENCRYPTED FILE' | xargs -n 1 -r sops --decrypt --in-place
      - name: Create Service
        run: flyctl apps create "$SERVICE" || true
      - name: Add Certificates
        run: test -f .certs && xargs -a .certs -I{} flyctl certs add {} --app "$SERVICE" || true
      - name: Import Secrets
        run: test -f .env && grep -v '^sops_' .env | flyctl secrets import --app "$SERVICE" || true
      - name: Deploy
        run: flyctl deploy --app "$SERVICE" --config fly.toml > /dev/null
      - name: Scale Machines
        run: test -f .machine-count && flyctl scale count "$(tr -d '[:space:]' < .machine-count)" --app "$SERVICE" || true
