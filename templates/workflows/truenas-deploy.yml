name: Deploy

on:
  push:
    paths:
      - .github/deploy-request.json
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy all, a server, a service, or server/service"

concurrency:
  cancel-in-progress: false
  group: deploy

jobs:
  deployments:
    name: Select Deployments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.deployments.outputs.deployments }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Select Deployments
        id: deployments
        env:
          BEFORE: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_TARGET" ] && ! printf '%s' "$INPUT_TARGET" | grep -Eq '^[a-z0-9][a-z0-9-]*(/[a-z0-9][a-z0-9-]*)?$'; then
            echo "Invalid target: $INPUT_TARGET" >&2
            exit 1
          fi

          REMOVALS=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -z "$INPUT_TARGET" ]; then
            TARGETS=$(find . -maxdepth 2 -mindepth 2 -type d ! -path './.*' -printf '%P\n')
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && printf '%s' "$INPUT_TARGET" | grep -q '/'; then
            if [ ! -d "$INPUT_TARGET" ]; then
              echo "No deployment found for target: $INPUT_TARGET" >&2
              exit 1
            fi
            TARGETS=$(printf '%s\n' "$INPUT_TARGET")
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -d "$INPUT_TARGET" ]; then
            TARGETS=$(find "$INPUT_TARGET" -maxdepth 1 -mindepth 1 -type d -printf '%p\n')
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TARGETS=$(find . -maxdepth 2 -mindepth 2 -type d -name "$INPUT_TARGET" -printf '%P\n')
          else
            git show "$BEFORE:.github/deploy-request.json" > before.json 2>/dev/null || printf '{"deployments":{}}' > before.json
            REMOVALS=$(jq -r --slurpfile before before.json '
              ($before[0].deployments // {}) as $old
              | (.deployments // {}) as $new
              | $old | to_entries[]
              | select($new[.key] == null)
              | .key
            ' .github/deploy-request.json)
            TARGETS=$(jq -r --slurpfile before before.json '
              ($before[0].deployments // {}) as $old
              | (.deployments // {})
              | to_entries[]
              | select($old[.key] != .value)
              | .key
            ' .github/deploy-request.json)
          fi

          printf '%s\n' "$TARGETS" | jq -Rsc --arg removals "$REMOVALS" '
            [split("\n")[] | select(test("^[^./][^/]*/[^/]+$")) | split("/") as $p | {path: ., server: $p[0]}] as $targets
            | ($removals | [split("\n")[] | select(test("^[^./][^/]*/[^/]+$")) | split("/") as $p | {server: $p[0], service: $p[1]}]) as $rm
            | (($targets | map(.server)) + ($rm | map(.server))) | unique
            | map(. as $server | {
                paths: [$targets[] | select(.server == $server) | .path] | sort,
                removals: [$rm[] | select(.server == $server) | .service] | sort,
                secret_name: ("AGE_KEY_" + ($server | ascii_upcase | gsub("-"; "_"))),
                server: $server
              })
          ' | sed 's/^/deployments=/' >> "$GITHUB_OUTPUT"

  deploy:
    if: needs.deployments.outputs.matrix != '[]'
    name: Deploy ${{ matrix.target.server }}
    needs: [deployments]
    runs-on: [self-hosted, "${{ matrix.target.server }}-privileged"]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        target: ${{ fromJSON(needs.deployments.outputs.matrix) }}
    env:
      REMOVALS: ${{ toJSON(matrix.target.removals) }}
      SERVER: ${{ matrix.target.server }}
      SOPS_AGE_KEY: ${{ secrets[matrix.target.secret_name] }}
      TARGET_PATHS: ${{ toJSON(matrix.target.paths) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup sops
        uses: nhedger/setup-sops@v2
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Setup midclt
        run: uv tool install --python 3.12 git+https://github.com/truenas/api_client.git@b96ff63967962aa78d422d57a364722a1cda328f
      - name: Decrypt Files
        run: |
          find "$SERVER" -type f -print0 | while IFS= read -r -d '' f; do
            if grep -qE 'BEGIN AGE ENCRYPTED FILE|ENC\[AES256_GCM' "$f"; then
              if grep -qE '^[[:space:]]*"?data"?:[[:space:]]*"?ENC\[AES256_GCM' "$f"; then
                sops --decrypt --output-type binary "$f" > "$f.tmp"
                mv "$f.tmp" "$f"
              else
                sops --decrypt --in-place "$f"
              fi
            fi
          done
      - name: Deploy Services
        run: |
          printf '%s' "$TARGET_PATHS" | jq -r '.[]' | while read -r TARGET_PATH; do
            SERVICE=$(basename "$TARGET_PATH")
            echo "Deploying $SERVICE"

            if [ -f "$TARGET_PATH/app.json" ]; then
              echo "Deploying catalog service $SERVICE"
              if midclt call app.get_instance "$SERVICE" > /dev/null 2>&1; then
                CURRENT_VALUES=$(midclt call app.config "$SERVICE")
                UPDATE_PAYLOAD=$(jq -n -c --argjson current "$CURRENT_VALUES" --slurpfile desired "$TARGET_PATH/app.json" '{values: ($current * ($desired[0].values // {}))}')
                midclt call -j app.update "$SERVICE" "$UPDATE_PAYLOAD" > /dev/null
                echo "✓ $SERVICE updated"
              else
                echo "$SERVICE not found; creating catalog service"
                midclt call -j app.create "$(jq -c . "$TARGET_PATH/app.json")" > /dev/null
                echo "✓ $SERVICE created"
              fi
            fi

            if [ -f "$TARGET_PATH/compose.json" ]; then
              echo "Deploying custom service $SERVICE"
              if midclt call app.get_instance "$SERVICE" > /dev/null 2>&1; then
                midclt call -j app.update "$SERVICE" "$(jq -c '{custom_compose_config}' "$TARGET_PATH/compose.json")" > /dev/null
                echo "✓ $SERVICE updated"
              else
                echo "$SERVICE not found; creating custom service"
                midclt call -j app.create "$(jq -c . "$TARGET_PATH/compose.json")" > /dev/null
                echo "✓ $SERVICE created"
              fi
            fi

            find "$TARGET_PATH" -mindepth 2 -type f ! -name "app.json" ! -name "compose.json" | while read -r f; do
              REL_PATH="${f#"$TARGET_PATH"/}"
              CONTAINER_SERVICE="${REL_PATH%%/*}"
              CONTAINER=$(docker ps --format '{{.Names}}' | grep -m1 "^ix-${SERVICE}-${CONTAINER_SERVICE}-" || true)
              if [ -z "$CONTAINER" ] && [ "$CONTAINER_SERVICE" != "$SERVICE" ]; then
                CONTAINER=$(docker ps --format '{{.Names}}' | grep -m1 "^ix-${SERVICE}-${SERVICE}-" || true)
              fi
              if [ -n "$CONTAINER" ]; then
                docker cp "$f" "$CONTAINER:/$REL_PATH"
                echo "✓ $CONTAINER:/$REL_PATH"
              else
                echo "⚠ no container found matching ix-${SERVICE}-${CONTAINER_SERVICE}-* or ix-${SERVICE}-${SERVICE}-*"
              fi
            done
          done
      - name: Delete Services
        run: |
          printf '%s' "$REMOVALS" | jq -r '.[]' | while read -r SERVICE; do
            if midclt call app.get_instance "$SERVICE" > /dev/null 2>&1; then
              midclt call -j app.delete "$SERVICE" > /dev/null
              echo "✓ $SERVICE deleted"
            else
              echo "⚠ $SERVICE not found, skipping deletion"
            fi
          done
