# yaml-language-server: $schema=../schemas/config.json
ai:
  default_model: deepseek-v4-flash
  default_model_provider: deepseek
cloudflare:
  account_name: excloo
  access:
    identity_providers:
      excloo_id: Excloo ID
domains:
  acme: 043847.xyz
  external: excloo.net
  internal: excloo.dev
github:
  owner: excloo
  repositories:
    docker: docker
    fly: fly
    truenas: truenas
networking:
  allowlists:
    internal:
      - 10.0.0.0/23
      - 100.64.0.0/10
      - 127.0.0.1/32
      - 172.16.0.0/12
      - ::1/128
      - fd7a:115c:a1e0::/48
onepassword:
  vaults:
    servers:
      id: jfp5upb7y2wmr4hbz7enfpdh5e
      tags:
        - Homelab
    services:
      id: vjxx2dvl7ukvsqcic3bboeazbi
      tags:
        - Homelab
organization:
  email: max@excloo.com
  managed_comment: OpenTofu Managed
  name: excloo
resend:
  host: smtp.resend.com
  port: 465
  username: resend
server_types:
  appliance:
    icon: mdi-devices-#ffffff
    label: Appliances
    tailscale_tag: appliance
  cicd:
    icon: mdi-git-#ffffff
    label: CI/CD
    tailscale_tag: cicd
  ephemeral:
    icon: mdi-timelapse-#ffffff
    label: Ephemeral
    tailscale_tag: ephemeral
  router:
    icon: mdi-router-wireless-#ffffff
    label: Routers
    tailscale_tag: router
  server:
    icon: mdi-server-#ffffff
    label: Servers
    tailscale_tag: server
  vm:
    icon: mdi-cloud-#ffffff
    label: VMs
    tailscale_tag: vm
system:
  locale: en_AU
  shell: /bin/bash
  timezone: Australia/Sydney
tailscale:
  admin_identities:
    - max@excloo.com
    - maxexcloo@passkey
  approver_excludes:
    - appliance
    - cicd
    - ephemeral
