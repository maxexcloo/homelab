domain_acme: 043847.xyz
domain_external: excloo.net
domain_internal: excloo.dev
email: max@excloo.com
locale: en_AU
managed_comment: OpenTofu Managed
organization: excloo
shell: /bin/bash
timezone: Australia/Sydney

bitwarden:
  servers_folder: Servers
  services_folder: Services
  url_field_pattern: "(^fqdn_|^url_|_(ipv[46]|address)$)"

dns:
  priority: null
  proxied: false
  ttl: 1
  wildcard: false

github:
  fly_repository: fly
  komodo_repository: komodo

incus:
  profiles:
    description: ""
    config: {}
    devices: {}
    remotes: []
  projects:
    description: ""
    config:
      features.images: true
      features.networks: true
      features.networks.zones: true
      features.profiles: true
      features.storage.buckets: true
      features.storage.volumes: true
    remotes: []

resend:
  smtp_host: smtp.resend.com
  smtp_port: 465
  smtp_username: resend

servers:
  id: ""
  parent: ""
  platform: unmanaged
  type: server
  features:
    b2: false
    cloudflare_acme_token: false
    cloudflare_proxy: false
    cloudflare_zero_trust_tunnel: false
    docker: false
    password: false
    resend: false
    tailscale: false
    talos: false
  identity:
    name: ""
    description: ""
    region: ""
    username: root
  networking:
    management_address: ""
    management_port: 443
    public_address: ""
    public_ipv4: ""
    public_ipv6: ""
  platform_config:
    incus:
      cpus: 2
      image: null
      memory: 4
      nested: false
      privileged: false
      protection: false
      secureboot: false
      type: container
      disks: []
      networks: []
      pci_devices: []
      profiles:
        - default
      usb_devices: []
    oci:
      assign_public_ip: true
      cpus: 2
      disk_size: 128
      image_id: null
      memory: 4
      shape: VM.Standard.A1.Flex
      ingress_ports:
        - 22
        - 80
        - 443
    talos:
      role: worker

services:
  id: ""
  deploy_to: []
  features:
    b2: false
    monitoring: true
    password: false
    resend: false
    tailscale: false
    secrets: []
  identity:
    name: ""
    description: ""
    service: ""
    username: ""
  networking:
    port: null
    ssl: true
    ssl_validation: true
    urls: []
  platform_config:
    fly:
      cpu_kind: shared
      cpus: 1
      image: null
      memory: 256
      org: ""
      port: 8080
      region: ""
  widgets: []

tailscale:
  admin_identities:
    - maxexcloo@passkey
  tags:
    - appliance
    - ephemeral
    - router
    - server
    - vm
