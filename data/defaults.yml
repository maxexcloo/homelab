# yaml-language-server: $schema=../schemas/defaults.json
organization:
  name: excloo
  email: max@excloo.com
  managed_comment: OpenTofu Managed

domains:
  acme: 043847.xyz
  external: excloo.net
  internal: excloo.dev

system:
  locale: en_AU
  shell: /bin/bash
  timezone: Australia/Sydney

bitwarden:
  url_field_pattern: "(^fqdn_|^url_|_(ipv[46]|address)$)"
  folders:
    servers: Servers
    services: Services

dns:
  priority: null
  proxied: false
  ttl: 1
  wildcard: false

github:
  repositories:
    fly: excloo/fly
    komodo: excloo/komodo
    truenas: excloo/truenas

resend:
  host: smtp.resend.com
  port: 465
  username: resend

servers:
  id: ""
  parent: ""
  platform: unmanaged
  type: server
  features:
    b2: false
    cloudflare_acme_token: false
    cloudflare_proxy: false
    cloudflare_zero_trust_tunnel: false
    docker: false
    password: false
    resend: false
    tailscale: false
  identity:
    name: ""
    description: ""
    region: ""
    username: root
  networking:
    management_address: ""
    management_port: 443
    public_address: ""
    public_ipv4: ""
    public_ipv6: ""
  platform_config:
    incus:
      cpus: 2
      image: null
      memory: 4
      nested: false
      privileged: false
      protection: false
      secureboot: false
      type: container
      disks: []
      networks: []
      pci_devices: []
      profiles:
        - default
      usb_devices: []
    oci:
      assign_public_ip: true
      cpus: 2
      disk_size: 128
      image_id: null
      memory: 4
      shape: VM.Standard.A1.Flex
      ingress_ports:
        - 22
        - 80
        - 443

services:
  id: ""
  deploy_to: []
  features:
    b2: false
    monitoring: true
    password: false
    resend: false
    tailscale: false
    secrets: []
  identity:
    name: ""
    description: ""
    group: ""
    service: ""
    username: ""
  networking:
    port: null
    scheme: null
    ssl: true
    ssl_validation: true
    urls: []
  platform_config:
    docker: null
    homepage: null
    fly:
      cpu_kind: shared
      cpus: 1
      image: null
      memory: 256
      org: ""
      port: 8080
      region: ""

tailscale:
  admin_identities:
    - max@excloo.com
    - maxexcloo@passkey
  tags:
    - appliance
    - ephemeral
    - router
    - server
    - vm
