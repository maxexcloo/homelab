# yaml-language-server: $schema=../../schemas/dns.json
name: schaefer.au
records:
  - type: CNAME
    name: fm1._domainkey
    content: fm1.schaefer.au.dkim.fmhosted.com
  - type: CNAME
    name: fm2._domainkey
    content: fm2.schaefer.au.dkim.fmhosted.com
  - type: CNAME
    name: fm3._domainkey
    content: fm3.schaefer.au.dkim.fmhosted.com
  - type: CNAME
    name: mesmtp._domainkey
    content: mesmtp.schaefer.au.dkim.fmhosted.com
  - type: MX
    name: "@"
    content: in1-smtp.messagingengine.com
    priority: 10
  - type: MX
    name: "@"
    content: in2-smtp.messagingengine.com
    priority: 20
  - type: TXT
    name: "@"
    id: txt-apex-dmarc
    content: '"v=DMARC1; p=none;"'
  - type: TXT
    name: "@"
    id: txt-apex-spf
    content: '"v=spf1 include:spf.messagingengine.com ?all"'
