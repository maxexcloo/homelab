# yaml-language-server: $schema=../../schemas/server.json
platform: unifi
type: router
credentials:
  fields:
    homepage_widget_key: {}
dashboard:
  - name: ${server.identity.title}
    description: ${server.description}
    group: ${defaults.server_types[server.type].label}
    href: ${server.urls.default.href}
    icon: unifi
    siteMonitor: ${server.urls.default.href}
    widgets:
      - type: unifi
        key: ${server.runtime.credentials.homepage_widget_key}
        url: ${server.urls.default.href}
features:
  cloudflare_acme_token: true
  password: true
  tailscale: true
identity:
  name: au
  region: au
  title: AU
  username: root
networking:
  public_host: excloo-au.controld.live
