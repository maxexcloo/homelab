id: au-pie-truenas
name: truenas
description: TrueNAS
parent: au-pie
username: root
platform: incus
region: au
type: vm
enable_b2: true
enable_cloudflare_acme_token: true
enable_cloudflare_proxy: true
enable_cloudflare_zero_trust_tunnel: true
enable_docker: false
enable_password: true
enable_resend: true
enable_tailscale: true
config:
  incus:
    cpus: 8
    disks:
      - pool: default
        path: /
        size: 32
    image: truenas
    memory: 32
    networks:
      - network: enp3s0
        mac_address: 10:66:6a:5d:8e:a2
    profiles:
      - default
    secureboot: false
    type: virtual-machine
    pci_devices:
      - address: '0000:01:00.0'
      - address: '0000:05:00.0'
      - address: '0000:07:00.0'
      - address: '0000:07:00.1'
  oci: null
