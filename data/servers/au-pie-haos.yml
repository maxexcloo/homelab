id: au-pie-haos
name: haos
description: HAOS
parent: au-pie
username: root
platform: incus
region: au
type: vm
public_address: ''
public_ipv4: ''
public_ipv6: ''
management_port: 443
enable_b2: true
enable_cloudflare_acme_token: true
enable_cloudflare_proxy: false
enable_cloudflare_zero_trust_tunnel: true
enable_docker: false
enable_password: true
enable_resend: false
enable_tailscale: true
config:
  incus:
    cpus: 2
    disks:
      - pool: local
        path: /
        size: 128
    image: haos
    memory: 4
    networks:
      - network: eno1
        mac_address: 10:66:6a:38:76:25
    profiles:
      - default
    secureboot: true
    type: virtual-machine
  oci: null
