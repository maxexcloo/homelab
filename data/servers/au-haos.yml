# yaml-language-server: $schema=../../schemas/server.json
parent: au
platform: unmanaged
type: server
credentials:
  fields:
    homepage_widget_key: {}
dashboard:
  - name: Home Assistant
    description: Smart Home & Automations
    group: ${server.identity.group}
    href: ${server.urls.management.href}
    icon: home-assistant
    siteMonitor: ${server.urls.management.href}
    widgets:
      - type: homeassistant
        key: ${server.runtime.credentials.homepage_widget_key}
        url: ${server.urls.management.href}
  - name: ESPHome
    description: ESP Device Builder
    group: ${server.identity.group}
    href: ${server.urls.management.href}/5c53de3b_esphome
    icon: esphome
    siteMonitor: ${server.urls.management.href}/5c53de3b_esphome
  - name: ESPresense
    description: Room Presence
    group: ${server.identity.group}
    href: ${server.urls.management.href}/f32ea98b_espresense-companion
    icon: espressif
    siteMonitor: ${server.urls.management.href}/f32ea98b_espresense-companion
  - name: Home Assistant Matter Hub
    description: Matter Bridge
    group: ${server.identity.group}
    href: ${server.urls.management.href}/3fd9e6b0_hamh
    icon: sh-home-assistant-matter-hub
    siteMonitor: ${server.urls.management.href}/3fd9e6b0_hamh
  - name: Studio Code Server
    description: Browser IDE
    group: ${server.identity.group}
    href: ${server.urls.management.href}/a0d7b954_vscode
    icon: visual-studio-code
    siteMonitor: ${server.urls.management.href}/a0d7b954_vscode
  - name: Zigbee2MQTT
    description: Zigbee Coordinator
    group: ${server.identity.group}
    href: ${server.urls.management.href}/45df7312_zigbee2mqtt
    icon: zigbee2mqtt
    siteMonitor: ${server.urls.management.href}/45df7312_zigbee2mqtt
features:
  beszel: true
  cloudflare_acme: true
  cloudflared: true
  dozzle: true
  object_storage: true
  password: true
  tailscale: true
identity:
  name: haos
  region: au
  title: HAOS
  username: root
networking:
  mac_address: 84:47:09:67:c8:33
  management_port: 443
routing:
  backend_url: https://homeassistant
  urls:
    - expose: cloudflare
      url: home-assistant.excloo.com
