# yaml-language-server: $schema=../../schemas/server.json
parent: au
platform: truenas
type: server
credentials:
  fields:
    homepage_widget_key: {}
dashboard:
  - name: TrueNAS
    description: ${server.identity.description}
    group: ${server.identity.group}
    href: ${server.urls.management.href}
    icon: truenas
    siteMonitor: ${server.urls.management.href}
    widgets:
      - type: truenas
        enablePools: "true"
        key: ${server.runtime.credentials.homepage_widget_key}
        url: ${server.urls.management.href}
        version: 2
features:
  b2: true
  beszel_agent: true
  cloudflare_acme: true
  cloudflare_acme_legacy: true
  cloudflared: true
  password: true
  resend: true
  tailscale: true
identity:
  name: truenas
  region: au
  title: TrueNAS
  username: root
networking:
  management_port: 8443
