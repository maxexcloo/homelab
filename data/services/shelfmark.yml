# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    hardcover_api_key: {}
dashboard:
  - {}
data:
  aa_mirror_urls: https://annas-archive.pk,https://annas-archive.gd,https://annas-archive.gl
  libgen_mirror_urls: https://libgen.vg,https://libgen.la,https://libgen.bz,https://libgen.gl,https://libgen.li
  zlib_mirror_urls: https://z-lib.sk
  oidc_callback_urls:
    - /api/auth/oidc/callback
features:
  oidc: true
  password: true
identity:
  description: Book Search & Downloads
  group: Media
  service: shelfmark
  title: Shelfmark
  username: max@excloo.com
imports:
  services:
    grimmory: grimmory-au-truenas
routing:
  backend_port: 30260
targets:
  au-truenas:
    truenas:
      env:
        AA_MIRROR_URLS: ${service.data.aa_mirror_urls}
        AUTH_METHOD: oidc
        BOOKLORE_DESTINATION: bookdrop
        BOOKLORE_HOST: ${services.grimmory.urls.default.href}
        BOOKLORE_PASSWORD: ${services.grimmory.runtime.credentials.password}
        BOOKLORE_USERNAME: ${services.grimmory.identity.username}
        BOOKS_OUTPUT_MODE: booklore
        CALIBRE_WEB_URL: ${services.grimmory.urls.default.href}
        DIRECT_DOWNLOAD_ENABLED: true
        HARDCOVER_API_KEY: ${service.runtime.credentials.hardcover_api_key}
        HARDCOVER_ENABLED: true
        LIBGEN_MIRROR_URLS: ${service.data.libgen_mirror_urls}
        METADATA_PROVIDER: hardcover
        OIDC_BUTTON_LABEL: Excloo ID
        OIDC_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        OIDC_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        OIDC_DISCOVERY_URL: ${service.runtime.attributes.oidc_issuer_url}/.well-known/openid-configuration
        SESSION_COOKIE_SECURE: true
        SUPPORTED_FORMATS: azw3,cbr,cbz,djvu,epub,fb2,mobi,pdf
        ZLIB_MIRROR_URLS: ${service.data.zlib_mirror_urls}
