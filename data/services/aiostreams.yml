# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    secret_key:
      bootstrap_length: 32
      bootstrap_type: hex
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: sh-aiostreams
    siteMonitor: ${service.urls.default.href}
features:
  password: true
identity:
  description: Stremio Aggregator
  group: Media
  name: aiostreams
  service: aiostreams
  title: AIOStreams
routing:
  backend_port: 30375
  backend_scheme: http
targets:
  au-truenas:
    truenas:
      env:
        AIOSTREAMS_AUTH: admin:${service.runtime.credentials.password}
        FEATURED_TEMPLATE_IDS: tamtaro.complete,Vidhin05.english-template
        SEL_SYNC_ACCESS: all
        TEMPLATE_REFRESH_INTERVAL: 3600
        TEMPLATE_URLS: '["https://raw.githubusercontent.com/Tam-Taro/SEL-Filtering-and-Sorting/refs/heads/main/Tamtaro-All-Templates-for-AIOStreams.json", "https://raw.githubusercontent.com/Vidhin05/Releases-Regex/refs/heads/main/all-templates.json"]'
        WHITELISTED_SYNC_REFRESH_INTERVAL: 3600
