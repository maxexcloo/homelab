# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    homepage_widget_key: {}
dashboard:
  - name: ESPHome
    description: ESP Device Builder
    group: ${service.identity.group}
    href: ${server.urls.default.href}/5c53de3b_esphome
    icon: esphome
    siteMonitor: ${server.urls.default.href}/5c53de3b_esphome
    widgets:
      - type: esphome
        password: ${server.runtime.credentials.password}
        url: http://${server.runtime.addresses.tailscale_ipv4}:6052
        username: ${server.identity.username}
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${server.urls.default.href}
    icon: homeassistant
    siteMonitor: ${server.urls.default.href}
    widgets:
      - type: homeassistant
        key: ${service.runtime.credentials.homepage_widget_key}
        url: ${server.urls.default.href}
  - name: ESPresense
    description: Room Presence
    group: ${service.identity.group}
    href: ${server.urls.default.href}/f32ea98b_espresense-companion
    icon: espressif
    siteMonitor: ${server.urls.default.href}/f32ea98b_espresense-companion
  - name: Home Assistant Matter Hub
    description: Matter Bridge
    group: ${service.identity.group}
    href: ${server.urls.default.href}/3fd9e6b0_hamh
    icon: sh-home-assistant-matter-hub
    siteMonitor: ${server.urls.default.href}/3fd9e6b0_hamh
  - name: Studio Code Server
    description: Browser IDE
    group: ${service.identity.group}
    href: ${server.urls.default.href}/a0d7b954_vscode
    icon: visual-studio-code
    siteMonitor: ${server.urls.default.href}/a0d7b954_vscode
  - name: Zigbee2MQTT
    description: Zigbee Coordinator
    group: ${service.identity.group}
    href: ${server.urls.default.href}/45df7312_zigbee2mqtt
    icon: zigbee2mqtt
    siteMonitor: ${server.urls.default.href}/45df7312_zigbee2mqtt
identity:
  description: Smart Home
  group: Home Automation
  name: home-assistant
  title: Home Assistant
targets:
  au-haos: {}
