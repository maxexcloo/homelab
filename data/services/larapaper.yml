# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    app_key:
      bootstrap_length: 32
      bootstrap_type: base64
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: sh-trmnl
    siteMonitor: ${service.urls.default.href}
features:
  password: true
identity:
  description: TRMNL Server
  group: Applications
  name: larapaper
  service: larapaper
  title: LaraPaper
  username: max@excloo.com
routing:
  backend_port: 8080
  backend_scheme: http
  urls:
    - expose: cloudflare
      url: larapaper.excloo.com
targets:
  au-truenas: {}
