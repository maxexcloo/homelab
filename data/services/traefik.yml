# yaml-language-server: $schema=../../schemas/service.json
container:
  labels:
    traefik.enable: "true"
    traefik.http.middlewares.autocompress.compress: "true"
    traefik.http.middlewares.internal-only.ipallowlist.sourcerange: ${defaults.networking.cidrs.docker}, ${defaults.networking.cidrs.lan}, ${defaults.networking.cidrs.localhost}, ${defaults.networking.cidrs.localhost_ipv6}, ${defaults.networking.cidrs.tailscale}, ${defaults.networking.cidrs.tailscale_ipv6}
    traefik.http.middlewares.tailscale-only.ipallowlist.sourcerange: ${defaults.networking.cidrs.docker}, ${defaults.networking.cidrs.localhost}, ${defaults.networking.cidrs.localhost_ipv6}, ${defaults.networking.cidrs.tailscale}, ${defaults.networking.cidrs.tailscale_ipv6}
    traefik.http.routers.dashboard.entrypoints: websecure
    traefik.http.routers.dashboard.middlewares: tailscale-only@docker
    traefik.http.routers.dashboard.rule: Host(`${service.fqdn_internal}`)
    traefik.http.routers.dashboard.service: api@internal
    traefik.http.services.traefik.loadbalancer.server.port: "8082"
identity:
  description: Reverse Proxy
  name: traefik
  service: traefik
  title: Traefik
targets:
  au-truenas: {}
