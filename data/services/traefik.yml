# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  href: https://traefik.${server.fqdn}
identity:
  description: Reverse Proxy
  name: traefik
  service: traefik
  title: Traefik
routing:
  port: 8082
  labels:
    traefik.http.middlewares.autocompress.compress: "true"
    traefik.http.middlewares.internal-only.ipallowlist.sourcerange: ${join(", ", defaults.networking.allowlists.internal)}
    traefik.http.routers.traefik.service: api@internal
targets:
  au-truenas: {}
