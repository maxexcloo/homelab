# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - widgets:
      - type: traefik
        url: ${service.urls.default.href}
features:
  oidc_forward_auth: true
identity:
  description: Reverse Proxy
  service: traefik
  title: Traefik
routing:
  backend_port: 8082
  labels:
    traefik.http.middlewares.autocompress.compress: "true"
    traefik.http.middlewares.internal-only.ipallowlist.sourcerange: ${join(", ", defaults.networking.allowlists.internal)}
    traefik.http.middlewares.redirect-to-https.redirectscheme.permanent: "true"
    traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
    traefik.http.routers.traefik.service: api@internal
targets:
  au-hsp: {}
  au-truenas: {}
