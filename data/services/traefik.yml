# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${server.dashboard[0].name}
    href: ${service.urls.default.href}
    icon: ${service.identity.name}
    siteMonitor: ${service.urls.default.href}
identity:
  description: Reverse Proxy
  name: traefik
  service: traefik
  title: Traefik
routing:
  backend_port: 8082
  backend_scheme: http
  labels:
    traefik.http.middlewares.autocompress.compress: "true"
    traefik.http.middlewares.internal-only.ipallowlist.sourcerange: ${join(", ", defaults.networking.allowlists.internal)}
    traefik.http.middlewares.redirect-to-https.redirectscheme.permanent: "true"
    traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: https
    traefik.http.routers.traefik.service: api@internal
targets:
  au-hsp: {}
  au-truenas: {}
