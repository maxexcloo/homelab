# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    github_token: {}
    homepage_widget_key: {}
    homepage_widget_secret: {}
    db_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    webhook_secret:
      bootstrap_length: 32
      bootstrap_type: hex
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.service}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.service}
        key: ${service.runtime.credentials.homepage_widget_key}
        secret: ${service.runtime.credentials.homepage_widget_secret}
        showSummary: true
        url: ${service.urls.default.href}
features:
  oidc: true
  password: true
  resend: true
identity:
  description: Container Orchestration
  group: Infrastructure
  name: komodo
  service: komodo
  title: Komodo
  username: max@excloo.com
imports:
  services:
    pocket_id: auto
routing:
  backend_port: 9120
  backend_scheme: http
  container: core
  urls:
    - expose: cloudflare
      url: komodo.excloo.net
      cloudflare_access:
        - auto_redirect_to_identity: true
          name: Komodo
          session_duration: 24h
          allowed_idps:
            - excloo_id
          policies:
            - decision: allow
              include:
                - everyone: {}
        - name: Komodo Webhook
          path: /listener/github/sync/komodo/sync
          policies:
            - decision: bypass
              include:
                - everyone: {}
targets:
  au-truenas:
    truenas:
      catalog_app: komodo
      env:
        KOMODO_CONFIG_PATH: /core/config/config.toml
        KOMODO_EMAIL_ENABLED: true
        KOMODO_EMAIL_HOST: ${defaults.resend.host}
        KOMODO_EMAIL_PASSWORD: ${service.runtime.credentials.resend_api_key}
        KOMODO_EMAIL_PORT: ${defaults.resend.port}
        KOMODO_EMAIL_USERNAME: ${defaults.resend.username}
        KOMODO_HOST: ${service.urls.default.href}
        KOMODO_OIDC_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        KOMODO_OIDC_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        KOMODO_OIDC_ENABLED: true
        KOMODO_OIDC_PROVIDER: ${services.pocket_id.urls.default.href}
        KOMODO_WEBHOOK_SECRET: ${service.runtime.credentials.webhook_secret}
