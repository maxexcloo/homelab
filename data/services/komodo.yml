# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.name}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.name}
        key: ${service.runtime.secrets.homepage_widget_key}
        secret: ${service.runtime.secrets.homepage_widget_secret}
        showSummary: true
        url: ${service.urls.default.href}
features:
  password: true
identity:
  description: Container Orchestration
  group: Infrastructure
  name: komodo
  service: komodo
  title: Komodo
  username: max@excloo.com
routing:
  container: core
  port: 9120
  scheme: http
secrets:
  - name: db_password
    bootstrap_length: 32
    bootstrap_type: alphanumeric
  - name: homepage_widget_key
  - name: homepage_widget_secret
  - name: webhook_secret
    bootstrap_length: 32
    bootstrap_type: hex
targets:
  au-truenas:
    truenas:
      catalog_app: komodo
      env:
        KOMODO_HOST: ${service.urls.default.href}
        KOMODO_WEBHOOK_SECRET: ${service.runtime.secrets.webhook_secret}
