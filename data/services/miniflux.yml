# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    homepage_widget_key: {}
  generated:
    db_password:
      length: 32
      type: alphanumeric
dashboard:
  - widgets:
      - type: ${service.identity.service}
        key: ${service.runtime.credentials.homepage_widget_key}
        url: ${service.urls.default.href}
data:
  oidc_callback_urls:
    - /oauth2/oidc/callback
features:
  oidc: true
  password: true
identity:
  description: RSS Reader
  group: Applications
  service: miniflux
  title: Miniflux
  username: max@excloo.com
routing:
  backend_port: 30285
targets:
  au-truenas:
    truenas:
      env:
        BASE_URL: ${service.urls.default.href}
        OAUTH2_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        OAUTH2_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        OAUTH2_OIDC_DISCOVERY_ENDPOINT: ${service.runtime.attributes.oidc_issuer_url}
        OAUTH2_OIDC_PROVIDER_NAME: Excloo ID
        OAUTH2_PROVIDER: oidc
        OAUTH2_REDIRECT_URL: ${service.urls.default.href}/oauth2/oidc/callback
        OAUTH2_USER_CREATION: 1
