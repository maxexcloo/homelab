# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    homepage_widget_key: {}
  generated:
    db_password:
      length: 32
      type: alphanumeric
    oidc_client_id:
      length: 16
      type: hex
    oidc_client_secret:
      length: 32
      type: hex
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.service}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.service}
        key: ${service.runtime.credentials.homepage_widget_key}
        url: ${service.urls.default.href}
features:
  password: true
identity:
  description: RSS Reader
  group: Applications
  name: miniflux
  service: miniflux
  title: Miniflux
  username: max@excloo.com
imports:
  services:
    pocket_id: pocket-id-au-truenas
routing:
  backend_port: 30285
  backend_scheme: http
targets:
  au-truenas:
    truenas:
      env:
        BASE_URL: ${service.urls.default.href}
        OAUTH2_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        OAUTH2_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        OAUTH2_OIDC_DISCOVERY_ENDPOINT: ${services.pocket_id.urls.default.href}
        OAUTH2_PROVIDER: oidc
        OAUTH2_REDIRECT_URL: ${service.urls.default.href}/oauth2/oidc/callback
        OAUTH2_USER_CREATION: 1
