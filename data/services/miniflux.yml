# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: db_password
    - name: homepage_widget_key
identity:
  description: RSS Reader
  group: Applications
  name: miniflux
  service: miniflux
  title: Miniflux
  username: max@excloo.com
networking:
  port: 30285
  scheme: http
platform_config:
  docker:
    env:
      BASE_URL: https://${service.fqdn_internal}
    labels:
      homepage.widget.key: ${service.homepage_widget_key_sensitive}
      homepage.widget.type: ${service.identity.service}
      homepage.widget.url: https://${service.fqdn_internal}
