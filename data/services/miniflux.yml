# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  weight: -10
  widget:
    key: ${service.state.secrets.homepage_widget_key}
    type: ${service.identity.service}
    url: https://${service.fqdn_internal}
features:
  password: true
  secrets:
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: db_password
    - name: homepage_widget_key
identity:
  description: RSS Reader
  group: Applications
  name: miniflux
  service: miniflux
  title: Miniflux
  username: max@excloo.com
routing:
  port: 30285
  scheme: http
targets:
  au-truenas:
    truenas:
      env:
        BASE_URL: https://${service.fqdn_internal}
