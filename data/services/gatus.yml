# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - fly
features:
  resend: true
  tailscale: true
identity:
  description: Health Monitoring and Status Page
  name: gatus
  title: Gatus
networking:
  port: 8080
  scheme: http
  urls:
    - status.excloo.com
platform_config:
  docker:
    labels:
      homepage.description: "${service.identity.description}"
      homepage.group: System
      homepage.href: "https://${service.url_0}"
      homepage.icon: "${service.identity.name}"
      homepage.name: "${service.identity.title}"
