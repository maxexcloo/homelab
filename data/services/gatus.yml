# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - widgets:
      - type: gatus
        url: ${service.urls.default.href}
data:
  endpoints:
    - name: Cloudflare
      group: Providers
      url: https://cloudflare.com/cdn-cgi/trace
      alerts:
        - type: email
      conditions:
        - "[STATUS] == 200"
        - "[BODY] == pat(*colo=*)"
        - "[RESPONSE_TIME] < 5000"
    - name: Cloudflare DNS
      group: Providers
      url: 1.1.1.1
      alerts:
        - type: email
      conditions:
        - "[CONNECTED] == true"
        - "[DNS_RCODE] == NOERROR"
        - "[RESPONSE_TIME] < 5000"
      dns:
        query-name: ${defaults.domains.external}
        query-type: A
    - name: Tailscale
      group: Providers
      url: https://login.tailscale.com/derpmap/default
      alerts:
        - type: email
      conditions:
        - "[STATUS] == 200"
        - "[RESPONSE_TIME] < 5000"
features:
  mail: true
  tailscale: true
identity:
  description: Health Monitoring & Status Page
  group: Infrastructure
  service: gatus
  title: Gatus
routing:
  backend_port: 8080
  routes:
    - expose: internal
      host: status.excloo.com
targets:
  fly: {}
