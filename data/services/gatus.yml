# yaml-language-server: $schema=../../schemas/service.json
credentials:
  generated:
    monitoring_token:
      length: 32
      type: hex
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.service}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: gatus
        url: ${service.urls.default.href}
features:
  mail: true
  tailscale: true
identity:
  description: Health Monitoring & Status Page
  group: Infrastructure
  name: gatus
  service: gatus
  title: Gatus
routing:
  backend_port: 8080
  backend_scheme: http
  urls:
    - expose: internal
      url: status.excloo.com
targets:
  fly: {}
