# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - name: ${service.identity.title}
    description: ${services.komodo.identity.description}
    group: ${server.identity.group}
    href: ${services.komodo.urls.default.href}/servers/${server.key}
    icon: ${services.komodo.identity.service}
    widgets:
      - type: komodo
        key: ${services.komodo.runtime.credentials.homepage_widget_key}
        secret: ${services.komodo.runtime.credentials.homepage_widget_secret}
        url: ${services.komodo.urls.default.href}
identity:
  description: Container Agent
  name: komodo-periphery
  service: komodo-periphery
  title: Komodo Periphery
imports:
  services:
    komodo: auto
targets:
  au-hsp: {}
  au-truenas: {}
