# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${server.urls.default.href}
    icon: ${service.identity.name}
    siteMonitor: ${server.urls.default.href}
    widgets:
      - type: ${service.identity.name}
        enablePools: "true"
        key: ${service.runtime.secrets.homepage_widget_key}
        url: ${server.urls.default.href}
        version: 2
identity:
  description: Network Attached Storage
  group: Infrastructure
  name: truenas
  title: TrueNAS
secrets:
  - name: homepage_widget_key
targets:
  au-truenas: {}
