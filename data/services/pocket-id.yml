# yaml-language-server: $schema=../../schemas/service.json
credentials:
  generated:
    encryption_key:
      length: 32
      type: base64
dashboard:
  - {}
features:
  mail: true
  password: true
identity:
  description: OIDC Provider
  group: Infrastructure
  service: pocket-id
  title: Excloo ID
  username: max@excloo.com
routing:
  backend_port: 1411
  routes:
    - expose: cloudflare
      host: id.excloo.com
targets:
  au-truenas:
    truenas:
      env:
        SMTP_ENCRYPTION: TLS
        SMTP_FROM_ADDRESS: ${service.key}@${defaults.domains.internal}
        SMTP_HOST: ${service.runtime.attributes.mail_host}
        SMTP_PASSWORD: ${service.runtime.credentials.mail_password}
        SMTP_PORT: ${service.runtime.attributes.mail_port}
        SMTP_USERNAME: ${service.runtime.attributes.mail_username}
