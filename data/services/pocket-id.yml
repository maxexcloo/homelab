# yaml-language-server: $schema=../../schemas/service.json
credentials:
  generated:
    encryption_key:
      length: 32
      type: base64
dashboard:
  - {}
features:
  mail: true
  password: true
identity:
  description: OIDC Provider
  group: Infrastructure
  service: pocket-id
  title: Excloo ID
  username: max@excloo.com
routing:
  backend_port: 1411
  routes:
    - expose: cloudflare
      host: id.excloo.com
targets:
  au-truenas:
    truenas:
      env:
        APP_NAME: ${service.identity.title}
        EMAILS_VERIFIED: true
        REQUIRE_USER_EMAIL: true
        SMTP_FROM: ${service.runtime.attributes.mail_from_address}
        SMTP_HOST: ${service.runtime.attributes.mail_host}
        SMTP_PASSWORD: ${service.runtime.credentials.mail_password}
        SMTP_PORT: ${service.runtime.attributes.mail_port}
        SMTP_TLS: tls
        SMTP_USER: ${service.runtime.attributes.mail_username}
        UI_CONFIG_DISABLED: true
