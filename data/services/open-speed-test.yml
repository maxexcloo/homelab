# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
identity:
  description: Network Speed Test
  name: open-speed-test
  title: Open Speed Test
networking:
  port: 30116
  scheme: http
platform_config:
  docker:
    labels:
      homepage.description: "${service.identity.description}"
      homepage.group: System
      homepage.href: "https://${service.fqdn_internal}"
      homepage.icon: "${service.identity.name}"
      homepage.name: "${service.identity.title}"
  truenas:
    port_key: http_port
