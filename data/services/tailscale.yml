# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - href: https://login.tailscale.com/admin/machines/${server.state.urls.tailscale_ipv4}
    widgets:
      - deviceid: ${server.state.fields.tailscale_device_id}
        key: ${service.state.secrets.homepage_widget_key}
        type: ${service.identity.service}
identity:
  description: VPN
  name: tailscale
  service: tailscale
  title: Tailscale
secrets:
  - name: homepage_widget_key
targets:
  au-haos: {}
  au-hsp: {}
  au-truenas: {}
  us-hotdog: {}
