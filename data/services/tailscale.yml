# yaml-language-server: $schema=../../schemas/service.json
target_feature: tailscale
dashboard:
  - href: https://login.tailscale.com/admin/machines/${server.runtime.addresses.tailscale_ipv4}
    widgets:
      - type: ${service.identity.service}
        deviceid: ${server.runtime.attributes.tailscale_device_id}
        key: ${services.homepage.runtime.credentials.tailscale_homepage_widget_key}
identity:
  description: VPN
  service: tailscale
  title: Tailscale
imports:
  services:
    homepage: homepage-au-truenas
