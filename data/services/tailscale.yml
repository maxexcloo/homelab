# yaml-language-server: $schema=../../schemas/service.json
container:
  labels:
    homepage.href: https://login.tailscale.com/admin/machines/${server.state.urls.tailscale_ipv4}
    homepage.widget.deviceid: ${server.state.fields.tailscale_device_id}
    homepage.widget.key: ${service.state.secrets.homepage_widget_key}
    homepage.widget.type: ${service.identity.service}
features:
  secrets:
    - name: homepage_widget_key
identity:
  description: VPN
  name: tailscale
  service: tailscale
  title: Tailscale
targets:
  au-truenas: {}
