# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${server.dashboard[0].name}
    href: https://login.tailscale.com/admin/machines/${server.runtime.addresses.tailscale_ipv4}
    icon: ${service.identity.name}
    widgets:
      - type: ${service.identity.name}
        deviceid: ${server.runtime.attributes.tailscale_device_id}
        key: ${services.homepage.runtime.secrets.tailscale_homepage_widget_key}
identity:
  description: VPN
  name: tailscale
  service: tailscale
  title: Tailscale
imports:
  services:
    homepage: auto
targets:
  au-haos: {}
  au-hsp: {}
  au-truenas: {}
  us-hotdog: {}
