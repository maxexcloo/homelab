# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: db_password
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: mysql_root_password
identity:
  description: Digital Library
  group: Media
  name: grimmory
  service: grimmory
  title: Grimmory
  username: maxexcloo
networking:
  port: 30396
  scheme: http
platform_config:
  docker:
    labels:
      homepage.icon: sh-grimmory
      homepage.widget.password: ${service.state.secrets.password}
      homepage.widget.type: booklore
      homepage.widget.url: https://${service.fqdn_internal}
      homepage.widget.username: ${service.identity.username}
  truenas:
    containers:
      - grimmory
