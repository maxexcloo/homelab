# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    db_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    mysql_root_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: sh-grimmory
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: booklore
        password: ${service.runtime.credentials.password}
        url: ${service.urls.default.href}
        username: ${service.identity.username}
features:
  password: true
  resend: true
identity:
  description: Digital Library
  group: Media
  name: grimmory
  service: grimmory
  title: Grimmory
  username: maxexcloo
routing:
  expose: cloudflare
  port: 30396
  scheme: http
  urls:
    - books.excloo.com
targets:
  au-truenas:
    truenas: {}
