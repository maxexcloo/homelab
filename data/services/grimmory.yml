# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  icon: sh-grimmory
  widget:
    password: ${service.state.secrets.password}
    type: booklore
    url: https://${service.fqdn_internal}
    username: ${service.identity.username}
features:
  password: true
  resend: true
identity:
  description: Digital Library
  group: Media
  name: grimmory
  service: grimmory
  title: Grimmory
  username: maxexcloo
routing:
  expose: cloudflare
  port: 30396
  scheme: http
  urls:
    - books.excloo.com
secrets:
  - bootstrap_length: 32
    bootstrap_type: alphanumeric
    name: db_password
  - bootstrap_length: 32
    bootstrap_type: alphanumeric
    name: mysql_root_password
targets:
  au-truenas:
    truenas: {}
