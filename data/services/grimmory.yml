# yaml-language-server: $schema=../../schemas/service.json
credentials:
  generated:
    db_password:
      length: 32
      type: alphanumeric
    mysql_root_password:
      length: 32
      type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: sh-grimmory
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: booklore
        password: ${service.runtime.credentials.password}
        url: ${service.urls.default.href}
        username: ${service.identity.username}
features:
  oidc: true
  password: true
  resend: true
identity:
  description: Digital Library
  group: Media
  name: grimmory
  service: grimmory
  title: Grimmory
  username: maxexcloo
imports:
  services:
    pocket_id: pocket-id-au-truenas
routing:
  backend_port: 30396
  backend_scheme: http
  urls:
    - expose: cloudflare
      url: books.excloo.com
targets:
  au-truenas:
    truenas:
      env:
        SPRING_MAIL_HOST: ${defaults.resend.host}
        SPRING_MAIL_PASSWORD: ${service.runtime.credentials.resend_api_key}
        SPRING_MAIL_PORT: ${defaults.resend.port}
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: true
        SPRING_MAIL_USERNAME: ${defaults.resend.username}
