# yaml-language-server: $schema=../../schemas/service.json
credentials:
  generated:
    db_password:
      length: 32
      type: alphanumeric
    mysql_root_password:
      length: 32
      type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: sh-grimmory
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: booklore
        password: ${service.runtime.credentials.password}
        url: ${service.urls.default.href}
        username: ${service.identity.username}
data:
  oidc_is_public: true
  oidc_pkce_enabled: true
  oidc_callback_urls:
    - /oauth2-callback
features:
  mail: true
  oidc: true
  password: true
identity:
  description: Digital Library
  group: Media
  name: grimmory
  service: grimmory
  title: Grimmory
  username: maxexcloo
routing:
  backend_port: 30396
  backend_scheme: http
  urls:
    - expose: cloudflare
      url: books.excloo.com
targets:
  au-truenas:
    truenas:
      env:
        SPRING_MAIL_HOST: ${service.runtime.attributes.mail_host}
        SPRING_MAIL_PASSWORD: ${service.runtime.credentials.mail_password}
        SPRING_MAIL_PORT: ${service.runtime.attributes.mail_port}
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
        SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: true
        SPRING_MAIL_USERNAME: ${service.runtime.attributes.mail_username}
