# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - name: ${services.beszel.identity.title}
    description: ${services.beszel.identity.description}
    group: ${server.dashboard[0].name}
    href: ${services.beszel.urls.default.href}/system/${service.runtime.secrets.system_id}
    icon: ${services.beszel.identity.name}
    widgets:
      - type: beszel
        password: ${services.beszel.runtime.secrets.password}
        systemId: ${service.runtime.secrets.system_id}
        url: ${services.beszel.urls.default.href}
        username: ${defaults.organization.email}
        version: 2
        fields:
          - status
          - cpu
          - memory
          - network
data:
  listen: 45876
  public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPkxnKuxsVqSVZVXQ3OGHjZZFMAAclU/xLrEDdwOyRt+
identity:
  description: Resource Monitoring Agent
  name: beszel-agent
  service: beszel-agent
  title: Beszel Agent
imports:
  services:
    beszel: auto
secrets:
  - name: system_id
  - name: token
targets:
  au-haos: {}
  au-hsp: {}
  au-truenas: {}
  us-hotdog: {}
