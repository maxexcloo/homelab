# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  description: ${services.beszel.identity.description}
  href: https://${services.beszel.fqdn_internal}/system/${service.state.secrets.system_id}
  icon: ${services.beszel.identity.name}
  name: ${services.beszel.identity.title}
  weight: -10
  widget:
    password: ${services.beszel.state.secrets.password}
    systemId: ${service.state.secrets.system_id}
    type: beszel
    url: https://${services.beszel.fqdn_internal}
    username: ${defaults.organization.email}
    version: "2"
    fields:
      - status
      - cpu
      - memory
      - network
data:
  listen: 45876
  public_key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPkxnKuxsVqSVZVXQ3OGHjZZFMAAclU/xLrEDdwOyRt+
features:
  secrets:
    - name: system_id
    - name: token
identity:
  description: Resource Monitoring Agent
  name: beszel-agent
  service: beszel-agent
  title: Beszel Agent
imports:
  services:
    beszel: beszel-${service.target}
targets:
  au-truenas: {}
