# yaml-language-server: $schema=../../schemas/service.json
containers:
  beszel-agent:
    environment:
      HUB_URL: http://localhost:${services.beszel.routing.port}
      # Beszel hub SSH host key used by agents to verify the hub connection.
      # If this key ever rotates, all agents must be updated.
      KEY: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPkxnKuxsVqSVZVXQ3OGHjZZFMAAclU/xLrEDdwOyRt+
      LISTEN: 45876
      TOKEN: ${service.state.secrets.token}
dashboard:
  description: ${services.beszel.identity.description}
  href: https://${services.beszel.fqdn_internal}/system/${service.state.secrets.system_id}
  icon: ${services.beszel.identity.name}
  name: ${services.beszel.identity.title}
  weight: -10
  widget:
    password: ${services.beszel.state.secrets.password}
    systemId: ${service.state.secrets.system_id}
    type: beszel
    url: https://${services.beszel.fqdn_internal}
    username: ${defaults.organization.email}
    version: "2"
    fields:
      - status
      - cpu
      - memory
      - network
features:
  secrets:
    - name: system_id
    - name: token
identity:
  description: Resource Monitoring Agent
  name: beszel-agent
  service: beszel-agent
  title: Beszel Agent
imports:
  services:
    beszel: beszel-${service.target}
targets:
  au-truenas: {}
