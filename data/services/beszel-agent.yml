# yaml-language-server: $schema=../../schemas/service.json
target_feature: beszel
dashboard:
  - name: ${services.beszel.identity.title}
    description: ${services.beszel.identity.description}
    group: ${server.identity.group}
    href: ${services.beszel.urls.default.href}/system/${server.runtime.credentials.beszel_system_id}
    icon: ${services.beszel.identity.service}
    widgets:
      - type: beszel
        password: ${services.beszel.runtime.credentials.password}
        systemId: ${server.runtime.credentials.beszel_system_id}
        url: ${services.beszel.urls.default.href}
        username: ${defaults.organization.email}
        version: 2
        fields:
          - status
          - cpu
          - memory
          - network
data:
  hub_url: ${services.beszel.urls.default.href}
  listen: ${services.beszel.data.agent_listen}
  public_key: ${services.beszel.data.agent_public_key}
identity:
  description: Resource Monitoring Agent
  name: beszel-agent
  service: beszel-agent
  title: Beszel Agent
imports:
  services:
    beszel: beszel-au-truenas
