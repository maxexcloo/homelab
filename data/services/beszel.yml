# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.url}
    icon: ${service.identity.name}
    siteMonitor: ${service.url}
    widgets:
      - type: ${service.identity.name}
        password: ${service.state.secrets.password}
        url: ${service.url}
        username: ${service.identity.username}
        version: 2
features:
  password: true
  resend: true
identity:
  description: System Monitoring
  group: Infrastructure
  name: beszel
  service: beszel
  title: Beszel
  username: max@excloo.com
routing:
  port: 30333
  scheme: http
targets:
  au-truenas:
    truenas:
      catalog_app: beszel-hub
