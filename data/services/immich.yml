# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  secrets:
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: db_password
    - name: homepage_widget_key
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: redis_password
identity:
  description: Photo Manager
  group: Media
  name: immich
  service: immich
  title: Immich
  username: max@excloo.com
networking:
  port: 30041
  scheme: http
platform_config:
  docker:
    labels:
      homepage.widget.key: ${service.state.secrets.homepage_widget_key}
      homepage.widget.type: ${service.identity.service}
      homepage.widget.url: https://${service.fqdn_internal}
      homepage.widget.version: "2"
  truenas:
    containers:
      - server
