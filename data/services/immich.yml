# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  weight: -10
  widget:
    key: ${service.state.secrets.homepage_widget_key}
    type: ${service.identity.service}
    url: https://${service.fqdn_internal}
    version: "2"
features:
  password: true
  secrets:
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: db_password
    - name: homepage_widget_key
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: redis_password
identity:
  description: Photo Manager
  group: Media
  name: immich
  service: immich
  title: Immich
  username: max@excloo.com
routing:
  container: server
  port: 30041
  scheme: http
  urls:
    - photos.excloo.com
targets:
  au-truenas:
    truenas: {}
