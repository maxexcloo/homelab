# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    homepage_widget_key: {}
  generated:
    db_password:
      length: 32
      type: alphanumeric
    redis_password:
      length: 32
      type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.service}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.service}
        key: ${service.runtime.credentials.homepage_widget_key}
        url: ${service.urls.default.href}
        version: 2
data:
  oidc_callback_urls:
    - /auth/login
    - /user-settings
    - app.immich:///oauth-callback
features:
  mail: true
  oidc: true
  password: true
identity:
  description: Photo Manager
  group: Media
  name: immich
  service: immich
  title: Immich
  username: max@excloo.com
routing:
  backend_port: 30041
  backend_scheme: http
  container: server
  urls:
    - expose: internal
      url: photos.excloo.com
targets:
  au-truenas:
    truenas:
      env:
        IMMICH_LOG_FORMAT: json
