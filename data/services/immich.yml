# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    homepage_widget_key: {}
    db_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    redis_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.service}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.service}
        key: ${service.runtime.credentials.homepage_widget_key}
        url: ${service.urls.default.href}
        version: 2
features:
  oidc: true
  password: true
  resend: true
identity:
  description: Photo Manager
  group: Media
  name: immich
  service: immich
  title: Immich
  username: max@excloo.com
imports:
  services:
    pocket_id: pocket-id-au-truenas
routing:
  backend_port: 30041
  backend_scheme: http
  container: server
  urls:
    - expose: internal
      url: photos.excloo.com
targets:
  au-truenas:
    truenas:
      env:
        OAUTH_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        OAUTH_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        OAUTH_ENABLED: true
        OAUTH_ISSUER_URL: ${services.pocket_id.urls.default.href}
        SMTP_ENABLED: true
        SMTP_FROM: ${service.key}@${defaults.domains.internal}
        SMTP_HOST: ${defaults.resend.host}
        SMTP_PASSWORD: ${service.runtime.credentials.resend_api_key}
        SMTP_PORT: ${defaults.resend.port}
        SMTP_USERNAME: ${defaults.resend.username}
