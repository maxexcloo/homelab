# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    homepage_widget_key: {}
    db_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    redis_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.name}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.name}
        key: ${service.runtime.credentials.homepage_widget_key}
        url: ${service.urls.default.href}
        version: 2
features:
  password: true
identity:
  description: Photo Manager
  group: Media
  name: immich
  service: immich
  title: Immich
  username: max@excloo.com
routing:
  container: server
  port: 30041
  scheme: http
  urls:
    - photos.excloo.com
targets:
  au-truenas:
    truenas: {}
