# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - widgets:
      - key: ${service.state.secrets.homepage_widget_key}
        type: ${service.identity.service}
        url: ${service.url}
        version: 2
features:
  password: true
identity:
  description: Photo Manager
  group: Media
  name: immich
  service: immich
  title: Immich
  username: max@excloo.com
routing:
  container: server
  port: 30041
  scheme: http
  urls:
    - photos.excloo.com
secrets:
  - name: db_password
    bootstrap_length: 32
    bootstrap_type: alphanumeric
  - name: homepage_widget_key
  - name: redis_password
    bootstrap_length: 32
    bootstrap_type: alphanumeric
targets:
  au-truenas:
    truenas: {}
