# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  href: https://dash.cloudflare.com/${server.state.fields.cloudflare_account_id}/one/networks/connectors/cloudflare-tunnels/cfd_tunnel/${server.state.fields.cloudflare_tunnel_id}/edit?tab=overview
  icon: cloudflare
  widget:
    accountid: ${server.state.fields.cloudflare_account_id}
    key: ${server.state.secrets.cloudflare_tunnel_read_token}
    tunnelid: ${server.state.fields.cloudflare_tunnel_id}
    type: ${service.identity.service}
identity:
  description: VPN
  name: cloudflared
  service: cloudflared
  title: Cloudflare Tunnel
targets:
  au-truenas: {}
