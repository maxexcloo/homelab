# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
identity:
  description: Stremio Metadata
  group: Media
  name: aiometadata
  service: aiometadata
  title: AIOMetadata
networking:
  port: 3232
  scheme: http
platform_config:
  docker:
    env:
      ADMIN_KEY: ${service.password_sensitive}
      DATABASE_URI: sqlite://addon/data/db.sqlite
      HOST_NAME: ${service.fqdn_internal}
      REDIS_URL: redis://redis:6379
    labels:
      homepage.icon: sh-aiostreams
