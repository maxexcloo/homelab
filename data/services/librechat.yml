credentials:
  fields:
    openai_api_key: {}
    jwt_refresh_secret:
      bootstrap_length: 48
      bootstrap_type: hex
    jwt_secret:
      bootstrap_length: 48
      bootstrap_type: hex
    meilisearch_master_key:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    mongo_db_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    pg_db_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
dashboard:
