# yaml-language-server: $schema=../../schemas/service.json
credentials:
  generated:
    cookie_secret:
      length: 32
      type: alphanumeric
data:
  oidc_pkce_enabled: true
  oidc_callback_urls:
    - /oauth2/callback
features:
  oidc: true
identity:
  description: Shared Authentication Proxy
  group: Infrastructure
  service: oauth2-proxy
  title: OAuth2 Proxy
routing:
  backend_port: 4180
  labels:
    traefik.http.middlewares.oauth2-forward-auth.forwardauth.address: http://127.0.0.1:4180
    traefik.http.middlewares.oauth2-forward-auth.forwardauth.authResponseHeaders: X-Auth-Request-Email,X-Auth-Request-Preferred-Username,X-Auth-Request-User
    traefik.http.middlewares.oauth2-forward-auth.forwardauth.trustForwardHeader: "true"
targets:
  au-hsp: {}
  au-truenas: {}
