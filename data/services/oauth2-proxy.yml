# yaml-language-server: $schema=../../schemas/service.json
credentials:
  generated:
    cookie_secret:
      length: 32
      type: base64
data:
  oidc_pkce_enabled: true
  oidc_callback_urls:
    - /oauth2/callback
features:
  oidc: true
identity:
  description: Shared Authentication Proxy
  group: Infrastructure
  service: oauth2-proxy
  title: OAuth2 Proxy
routing:
  backend_port: 4180
  labels:
    traefik.http.middlewares.oauth2-forward-auth.forwardauth.address: http://127.0.0.1:4180/oauth2/auth
    traefik.http.middlewares.oauth2-forward-auth.forwardauth.authResponseHeaders: X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Preferred-Username
    traefik.http.middlewares.oauth2-forward-auth.forwardauth.trustForwardHeader: "true"
    traefik.http.middlewares.oauth2-login.errors.query: /oauth2/sign_in?rd={url}
    traefik.http.middlewares.oauth2-login.errors.service: oauth2-proxy@docker
    traefik.http.middlewares.oauth2-login.errors.status: 401-403
targets:
  au-hsp: {}
  au-truenas: {}
