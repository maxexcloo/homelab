# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - widgets:
      - key: ${service.state.secrets.homepage_widget_key}
        type: ${service.identity.service}
        url: ${service.url}
features:
  password: true
  resend: true
identity:
  description: Bookmark Manager
  group: Applications
  name: linkwarden
  service: linkwarden
  title: Linkwarden
  username: max@excloo.com
routing:
  port: 30243
  scheme: http
secrets:
  - name: db_password
    bootstrap_length: 32
    bootstrap_type: alphanumeric
  - name: homepage_widget_key
  - name: meilisearch_master_key
    bootstrap_length: 32
    bootstrap_type: alphanumeric
  - name: nextauth_secret
    bootstrap_length: 32
    bootstrap_type: alphanumeric
targets:
  au-truenas:
    truenas:
      env:
        BASE_URL: ${service.url}
        EMAIL_FROM: ${service.key}@${defaults.domains.internal}
        EMAIL_SERVER: smtps://${defaults.resend.username}:${urlencode(service.state.secrets.resend_api_key)}@${defaults.resend.host}:${defaults.resend.port}
        NEXT_PUBLIC_EMAIL_PROVIDER: true
