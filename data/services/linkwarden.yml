# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    homepage_widget_key: {}
    openrouter_api_key: {}
  generated:
    db_password:
      length: 32
      type: alphanumeric
    meilisearch_master_key:
      length: 32
      type: alphanumeric
    nextauth_secret:
      length: 32
      type: alphanumeric
dashboard:
  - widgets:
      - type: ${service.identity.service}
        key: ${service.runtime.credentials.homepage_widget_key}
        url: ${service.urls.default.href}
data:
  oidc_callback_urls:
    - /api/v1/auth/callback/keycloak
features:
  mail: true
  oidc: true
  password: true
identity:
  description: Bookmark Manager
  group: Applications
  service: linkwarden
  title: Linkwarden
  username: max@excloo.com
routing:
  backend_port: 30243
targets:
  au-truenas:
    truenas:
      env:
        BASE_URL: ${service.urls.default.href}
        EMAIL_FROM: ${service.runtime.attributes.mail_from_address}
        EMAIL_SERVER: smtps://${service.runtime.attributes.mail_username}:${urlencode(service.runtime.credentials.mail_password)}@${service.runtime.attributes.mail_host}:${service.runtime.attributes.mail_port}
        KEYCLOAK_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        KEYCLOAK_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        KEYCLOAK_CUSTOM_NAME: ${service.runtime.attributes.oidc_provider_name}
        KEYCLOAK_ISSUER: ${service.runtime.attributes.oidc_issuer_url}
        NEXTAUTH_URL: ${service.urls.default.href}/api/v1/auth
        NEXT_PUBLIC_EMAIL_PROVIDER: true
        NEXT_PUBLIC_KEYCLOAK_ENABLED: true
        OPENROUTER_API_KEY: ${service.runtime.credentials.openrouter_api_key}
        OPENROUTER_MODEL: ${defaults.ai.default_model_provider}/${defaults.ai.default_model}
