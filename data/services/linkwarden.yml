# yaml-language-server: $schema=../../schemas/service.json
deploy_to:
  - au-truenas
features:
  password: true
  resend: true
  secrets:
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: db_password
    - name: homepage_widget_key
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: meilisearch_master_key
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: nextauth_secret
identity:
  description: Bookmark Manager
  group: Applications
  name: linkwarden
  service: linkwarden
  title: Linkwarden
  username: max@excloo.com
networking:
  port: 30243
  scheme: http
platform_config:
  docker:
    env:
      BASE_URL: https://${service.fqdn_internal}
      EMAIL_FROM: ${defaults.organization.email}
      EMAIL_SERVER: smtps://${defaults.resend.username}:${urlencode(service.resend_api_key_sensitive)}@${defaults.resend.host}:${defaults.resend.port}
      NEXT_PUBLIC_EMAIL_PROVIDER: true
    labels:
      homepage.widget.key: ${service.homepage_widget_key_sensitive}
      homepage.widget.type: ${service.identity.service}
      homepage.widget.url: https://${service.fqdn_internal}
