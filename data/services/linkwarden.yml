# yaml-language-server: $schema=../../schemas/service.json
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.name}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.name}
        key: ${service.runtime.secrets.homepage_widget_key}
        url: ${service.urls.default.href}
features:
  password: true
  resend: true
identity:
  description: Bookmark Manager
  group: Applications
  name: linkwarden
  service: linkwarden
  title: Linkwarden
  username: max@excloo.com
routing:
  port: 30243
  scheme: http
secrets:
  - name: db_password
    bootstrap_length: 32
    bootstrap_type: alphanumeric
  - name: homepage_widget_key
  - name: meilisearch_master_key
    bootstrap_length: 32
    bootstrap_type: alphanumeric
  - name: nextauth_secret
    bootstrap_length: 32
    bootstrap_type: alphanumeric
targets:
  au-truenas:
    truenas:
      env:
        BASE_URL: ${service.urls.default.href}
        EMAIL_FROM: ${service.key}@${defaults.domains.internal}
        EMAIL_SERVER: smtps://${defaults.resend.username}:${urlencode(service.runtime.secrets.resend_api_key)}@${defaults.resend.host}:${defaults.resend.port}
        NEXT_PUBLIC_EMAIL_PROVIDER: true
