# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    homepage_widget_key: {}
    db_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    meilisearch_master_key:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    nextauth_secret:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.service}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.service}
        key: ${service.runtime.credentials.homepage_widget_key}
        url: ${service.urls.default.href}
features:
  oidc: true
  password: true
  resend: true
identity:
  description: Bookmark Manager
  group: Applications
  name: linkwarden
  service: linkwarden
  title: Linkwarden
  username: max@excloo.com
imports:
  services:
    pocket_id: auto
routing:
  backend_port: 30243
  backend_scheme: http
targets:
  au-truenas:
    truenas:
      env:
        BASE_URL: ${service.urls.default.href}
        EMAIL_FROM: ${service.key}@${defaults.domains.internal}
        EMAIL_SERVER: smtps://${defaults.resend.username}:${urlencode(service.runtime.credentials.resend_api_key)}@${defaults.resend.host}:${defaults.resend.port}
        KEYCLOAK_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        KEYCLOAK_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        KEYCLOAK_ISSUER: ${services.pocket_id.urls.default.href}
        NEXT_PUBLIC_EMAIL_PROVIDER: true
        NEXT_PUBLIC_KEYCLOAK_ENABLED: true
