# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    igdb_client_id: {}
    igdb_client_secret: {}
    retroachievements_api_key: {}
    screenscraper_password: {}
    screenscraper_username: {}
    steamgriddb_api_key: {}
  generated:
    auth_secret_key:
      length: 32
      type: alphanumeric
    db_password:
      length: 32
      type: alphanumeric
    redis_password:
      length: 32
      type: alphanumeric
dashboard:
  - widgets:
      - type: ${service.identity.service}
        url: ${service.urls.default.href}
data:
  oidc_callback_urls:
    - /api/oauth/openid
features:
  oidc: true
  password: true
identity:
  description: Game & ROM Library
  group: Media
  service: romm
  title: RoMM
  username: max@excloo.com
routing:
  backend_port: 8080
  host_port: 30061
targets:
  au-truenas:
    truenas:
      env:
        OIDC_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        OIDC_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        OIDC_ENABLED: true
        OIDC_PROVIDER: ${service.runtime.attributes.oidc_provider_name}
        OIDC_REDIRECT_URI: ${service.urls.default.href}/api/oauth/openid
        OIDC_SERVER_APPLICATION_URL: ${service.runtime.attributes.oidc_issuer_url}
        ROMM_BASE_URL: ${service.urls.default.href}
        SCAN_TIMEOUT: 86400
