# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    igdb_client_id: {}
    igdb_client_secret: {}
    screenscraper_password: {}
    steamgriddb_api_key: {}
    auth_secret_key:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    db_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
    redis_password:
      bootstrap_length: 32
      bootstrap_type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.service}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.service}
        url: ${service.urls.default.href}
features:
  oidc: true
  password: true
  resend: true
identity:
  description: Game & ROM Library
  group: Media
  name: romm
  service: romm
  title: RoMM
  username: max@excloo.com
imports:
  services:
    pocket_id: auto
routing:
  backend_port: 8080
  backend_scheme: http
  host_port: 30061
targets:
  au-truenas:
    truenas:
      env:
        HASHEOUS_API_ENABLED: true
        OIDC_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        OIDC_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        OIDC_ENABLED: true
        OIDC_REDIRECT_URI: ${service.urls.default.href}/oidc/callback
        OIDC_SERVER_METADATA_URL: ${services.pocket_id.urls.default.href}/.well-known/openid-configuration
        OIDC_USERNAME_ATTRIBUTE: preferred_username
        SCAN_TIMEOUT: 86400
        SCREENSCRAPER_PASSWORD: ${service.runtime.credentials.screenscraper_password}
        SCREENSCRAPER_USER: ${defaults.organization.email}
        SMTP_FROM_ADDRESS: ${service.key}@${defaults.domains.internal}
        SMTP_HOST: ${defaults.resend.host}
        SMTP_PASSWORD: ${service.runtime.credentials.resend_api_key}
        SMTP_PORT: ${defaults.resend.port}
        SMTP_USERNAME: ${defaults.resend.username}
