# yaml-language-server: $schema=../../schemas/service.json
container:
  env:
    HASHEOUS_API_ENABLED: true
    SCAN_TIMEOUT: 86400
    SCREENSCRAPER_PASSWORD: ${service.state.secrets.screenscraper_password}
    SCREENSCRAPER_USER: ${defaults.organization.email}
  labels:
    homepage.widget.type: ${service.identity.service}
    homepage.widget.url: https://${service.fqdn_internal}
features:
  password: true
  secrets:
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: auth_secret_key
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: db_password
    - name: igdb_client_id
    - name: igdb_client_secret
    - bootstrap_length: 32
      bootstrap_type: alphanumeric
      name: redis_password
    - name: screenscraper_password
    - name: steamgriddb_api_key
identity:
  description: Game & ROM Library
  group: Media
  name: romm
  service: romm
  title: RoMM
  username: max@excloo.com
networking:
  port: 30061
  scheme: http
targets:
  au-truenas: {}
