# yaml-language-server: $schema=../../schemas/service.json
credentials:
  fields:
    igdb_client_id: {}
    igdb_client_secret: {}
    screenscraper_password: {}
    steamgriddb_api_key: {}
  generated:
    auth_secret_key:
      length: 32
      type: alphanumeric
    db_password:
      length: 32
      type: alphanumeric
    redis_password:
      length: 32
      type: alphanumeric
dashboard:
  - name: ${service.identity.title}
    description: ${service.identity.description}
    group: ${service.identity.group}
    href: ${service.urls.default.href}
    icon: ${service.identity.service}
    siteMonitor: ${service.urls.default.href}
    widgets:
      - type: ${service.identity.service}
        url: ${service.urls.default.href}
features:
  oidc: true
  password: true
identity:
  description: Game & ROM Library
  group: Media
  name: romm
  service: romm
  title: RoMM
  username: max@excloo.com
imports:
  services:
    pocket_id: pocket-id-au-truenas
routing:
  backend_port: 8080
  backend_scheme: http
  host_port: 30061
targets:
  au-truenas:
    truenas:
      env:
        OIDC_CLIENT_ID: ${service.runtime.credentials.oidc_client_id}
        OIDC_CLIENT_SECRET: ${service.runtime.credentials.oidc_client_secret}
        OIDC_ENABLED: true
        OIDC_PROVIDER: pocket-id
        OIDC_REDIRECT_URI: ${service.urls.default.href}/api/oauth/openid
        OIDC_SERVER_APPLICATION_URL: ${services.pocket_id.urls.default.href}
        ROMM_BASE_URL: ${service.urls.default.href}
        SCAN_TIMEOUT: 86400
