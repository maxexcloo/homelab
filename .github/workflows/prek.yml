name: Prek

concurrency:
  cancel-in-progress: true
  group: prek-${{ github.workflow }}-${{ github.ref }}

jobs:
  prek:
    name: Prek
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1
        with:
          persist-credentials: false
      - name: Set up mise
        uses: jdx/mise-action@v4.2.1
        with:
          version: 2026.7.13
      - name: Initialize OpenTofu
        run: mise exec -- tofu init -backend=false -input=false
      - name: Run prek
        run: mise run prek

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
