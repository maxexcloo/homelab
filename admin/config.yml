# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: maxexcloo/homelab
  branch: main
  base_url: https://sveltia-cms-auth.excloo.workers.dev

collections:
  - name: dns
    label: DNS
    extension: yml
    folder: data/dns
    format: yml
    identifier_field: name
    fields:
      - name: name
        label: DNS Zone
        hint: 'Domain name managed by Cloudflare. Example: example.com'
        widget: string
      - name: records
        label: DNS Records
        hint: 'Manual DNS records for this zone. Server and service records are created automatically.'
        required: false
        widget: list
        types:
          - name: A
            label: A Record (IPv4)
            fields:
              - name: name
                label: Hostname
                default: '@'
                hint: 'Subdomain or @ for root. Examples: www, blog, @'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: IPv4 Address
                hint: 'Target IPv4 address. Example: 192.168.1.1'
                widget: string
                pattern:
                  - ^(\d{1,3}\.){3}\d{1,3}$
                  - Must be a valid IPv4 address
              - name: proxied
                label: Cloudflare Proxy
                default: false
                hint: 'Route traffic through Cloudflare. Required for CDN/cache features.'
                widget: boolean
              - name: ttl
                label: TTL
                default: 1
                hint: 'Time to live in seconds. Use 1 for automatic, or 60-86400 for custom.'
                value_type: int
                widget: number
              - name: wildcard
                label: Create Wildcard
                default: false
                hint: 'Also create *.name record pointing to this target.'
                widget: boolean
          - name: AAAA
            label: AAAA Record (IPv6)
            fields:
              - name: name
                label: Hostname
                default: '@'
                hint: 'Subdomain or @ for root. Examples: www, blog, @'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: IPv6 Address
                hint: 'Target IPv6 address. Example: 2606:4700:4700::1111'
                widget: string
                pattern:
                  - ^([0-9a-fA-F:]+)$
                  - Must be a valid IPv6 address
              - name: proxied
                label: Cloudflare Proxy
                default: false
                hint: 'Route traffic through Cloudflare. Required for CDN/cache features.'
                widget: boolean
              - name: ttl
                label: TTL
                default: 1
                hint: 'Time to live in seconds. Use 1 for automatic, or 60-86400 for custom.'
                value_type: int
                widget: number
              - name: wildcard
                label: Create Wildcard
                default: false
                hint: 'Also create *.name record pointing to this target.'
                widget: boolean
          - name: CNAME
            label: CNAME Record (Alias)
            fields:
              - name: name
                label: Hostname
                hint: 'Subdomain to create. Examples: www, api, blog'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: Target Domain
                hint: 'Domain this points to. Example: example.com or cname.vercel-dns.com'
                widget: string
              - name: proxied
                label: Cloudflare Proxy
                default: false
                hint: 'Route traffic through Cloudflare. Required for CDN/cache features.'
                widget: boolean
              - name: ttl
                label: TTL
                default: 1
                hint: 'Time to live in seconds. Use 1 for automatic, or 60-86400 for custom.'
                value_type: int
                widget: number
              - name: wildcard
                label: Create Wildcard
                default: false
                hint: 'Also create *.name record pointing to this target.'
                widget: boolean
          - name: MX
            label: MX Record
            fields:
              - name: name
                label: Name
                default: '@'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: Mail Server
                widget: string
              - name: priority
                label: Priority
                default: 10
                value_type: int
                widget: number
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
          - name: NS
            label: NS Record
            fields:
              - name: name
                label: Name
                default: '@'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: Nameserver
                widget: string
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
          - name: SRV
            label: SRV Record
            fields:
              - name: name
                label: Name
                widget: string
              - name: content
                label: Target
                widget: string
              - name: priority
                label: Priority
                default: 10
                value_type: int
                widget: number
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
          - name: TXT
            label: TXT Record
            fields:
              - name: name
                label: Name
                widget: string
                default: '@'
              - name: content
                label: Content
                widget: string
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number

  - name: servers
    label: Servers
    extension: yml
    folder: data/servers
    format: yml
    identifier_field: id
    fields:
      - name: id
        label: ID
        hint: 'Unique identifier. Routers: just region. Servers: region-name. VMs: region-parent-name.'
        widget: string
        pattern:
          - ^[a-z]{2}(-[a-z0-9-]+)*$
          - 'Format: au | au-pie | au-pie-haos'
      - name: name
        label: Name
        hint: 'Machine name. Examples: au, pie, haos, truenas. Must match last part of ID.'
        widget: string
        pattern:
          - ^[a-z0-9-]+$
          - Lowercase letters, numbers, and hyphens only
      - name: parent
        label: Parent Server
        collection: servers
        hint: 'Parent router this runs under or parent server this runs on. Public IPs are inherited if not set (recursive up to 5 levels). Leave empty for routers.'
        required: false
        value_field: id
        widget: relation
        display_fields:
          - id
      - name: region
        label: Region
        hint: 'Location code used in FQDN (name.region). Examples: au, us, eu. Must match first segment of ID.'
        widget: string
      - name: type
        label: Type
        default: server
        hint: 'Routers: network entry points (no parent). Servers: host machines. VMs: guests on servers.'
        widget: select
        options:
          - router
          - server
          - vm
      - name: description
        label: Friendly Name
        hint: 'Human-readable name shown in dashboards. Example: TrueNAS Primary'
        required: false
        widget: string
      - name: platform
        label: Platform
        required: false
        widget: select
        options:
          - incus
          - oracle
          - physical
          - unifi
      - name: management_port
        label: Management Port
        hint: 'Port for web UI, can be empty.'
        default: 443
        required: false
        value_type: int
        widget: number
      - name: public_address
        label: Public Address
        hint: 'Public address routing to this server, takes priority over parent and IPv4 and IPv6, optional.'
        required: false
        widget: string
        pattern:
          - ^$|^([a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$
          - Must be a valid domain name or empty
      - name: public_ipv4
        label: Public IPv4
        hint: 'Public IPv4 of this server, takes priority over parent, optional.'
        required: false
        widget: string
        pattern:
          - ^$|^(\d{1,3}\.){3}\d{1,3}$
          - Must be a valid IPv4 address or empty
      - name: public_ipv6
        label: Public IPv6
        hint: 'Public IPv6 of this server, takes priority over parent, optional.'
        required: false
        widget: string
        pattern:
          - ^$|^([0-9a-fA-F:]+)$
          - Must be a valid IPv6 address or empty
      - name: username
        label: Username
        hint: 'Default login user.'
        default: root
        required: false
        widget: string
      - name: enable_b2
        label: Enable Backblaze B2
        hint: 'Creates B2 bucket and application key. Credentials stored in Bitwarden.'
        default: false
        widget: boolean
      - name: enable_cloudflare_acme_token
        label: Enable Cloudflare ACME
        hint: 'Creates API token for Let''s Encrypt DNS challenges. Token stored in Bitwarden.'
        default: false
        widget: boolean
      - name: enable_cloudflare_proxy
        label: Enable Cloudflare Proxy
        hint: 'Enables Cloudflare proxy on DNS records for this server.'
        default: false
        widget: boolean
      - name: enable_cloudflare_zero_trust_tunnel
        label: Enable Cloudflare Tunnel
        hint: 'Creates cloudflared tunnel for inbound access without open ports. Token stored in Bitwarden.'
        default: false
        widget: boolean
      - name: enable_docker
        label: Enable Docker
        hint: 'Install Docker engine on this server for container workloads.'
        default: false
        widget: boolean
      - name: enable_password
        label: Enable Password Login
        hint: 'Generate password for this server. Credential stored in Bitwarden.'
        default: false
        widget: boolean
      - name: enable_resend
        label: Enable Resend Email
        hint: 'Creates Resend API key for sending emails. Key stored in Bitwarden.'
        default: false
        widget: boolean
      - name: enable_tailscale
        label: Enable Tailscale
        hint: 'Creates auth key and joins Tailscale network. Key and device IPs stored in Bitwarden.'
        default: false
        widget: boolean

  - name: services
    label: Services
    extension: yml
    folder: data/services
    format: yml
    identifier_field: id
    fields:
      - name: id
        label: Service ID
        hint: 'Unique identifier for this service. Becomes the filename. Example: nginx, homeassistant, plex'
        widget: string
        pattern:
          - ^[a-z0-9-]+$
          - 'Lowercase letters, numbers, and hyphens only'
      - name: description
        label: Description
        hint: 'Human-readable description shown in service listings'
        required: false
        widget: string
      - name: service
        label: Service Config
        hint: 'References Docker Compose file or application configuration. Leave empty for simple services.'
        required: false
        widget: string
      - name: icon
        label: Dashboard Icon
        hint: 'Icon name for service dashboards (e.g., nginx, homeassistant, database). See Dashboard docs for available icons.'
        required: false
        widget: string
      - name: url
        label: External URL
        hint: 'Custom public URL if different from auto-generated. Leave empty to use name.domain format.'
        required: false
        widget: string
        pattern:
          - ^https?://[^\s]+$
          - Must start with http:// or https://
      - name: port
        label: Internal Port
        hint: 'Container/internal port the service listens on. Used for health checks and proxying.'
        required: false
        value_type: int
        widget: number
      - name: deploy_to
        label: Deploy To Servers
        collection: servers
        hint: 'Servers to deploy this service on. Creates one instance per selected server.'
        multiple: true
        required: false
        value_field: name
        widget: relation
        display_fields:
          - name
        search_fields:
          - name
      - name: secrets
        label: Auto-Generated Secrets
        hint: 'Secrets automatically created and stored in Bitwarden for this service.'
        multiple: true
        required: false
        widget: select
        options:
          - label: API Key (32-char random)
            value: api_key
          - label: Database Password (32-char random)
            value: database_password
          - label: Secret Hash (64-char base64)
            value: secret_hash
      - name: enable_b2
        label: Enable Backblaze B2
        default: false
        hint: 'Create dedicated B2 bucket for this service backups. Credentials stored in Bitwarden.'
        widget: boolean
      - name: enable_resend
        label: Enable Resend Email
        default: false
        hint: 'Create Resend API key for service to send emails. Key stored in Bitwarden.'
        widget: boolean
      - name: enable_tailscale
        label: Enable Tailscale
        default: false
        hint: 'Expose service on Tailscale network. Creates DNS records and auth key in Bitwarden.'
        widget: boolean

  - name: settings
    label: Settings
    files:
      - name: defaults
        label: Global Defaults
        file: data/defaults.yml
        fields:
          - name: organization
            label: Organization Name
            hint: 'Your organization name.'
            widget: string
          - name: email
            label: Admin Email
            hint: 'Primary contact email. Used for Let''s Encrypt notifications and service alerts.'
            widget: string
          - name: domain_external
            label: External Domain
            hint: 'Public-facing domain for external services. Example: excloo.com'
            widget: string
          - name: domain_internal
            label: Internal Domain
            hint: 'Private domain for internal services (Tailscale). Example: excloo.dev'
            widget: string
          - name: domain_acme
            label: ACME Domain
            hint: 'Domain for DNS-01 ACME challenges. Usually same as external or delegated subdomain.'
            widget: string
          - name: timezone
            label: Timezone
            hint: 'Default timezone for all servers. Example: Australia/Sydney, America/New_York'
            widget: string
          - name: locale
            label: Locale
            hint: 'Default locale for system messages. Example: en_US.UTF-8, en_AU.UTF-8'
            widget: string
          - name: shell
            label: Default Shell
            hint: 'Default login shell for users. Example: /bin/bash, /bin/zsh'
            widget: string
          - name: managed_comment
            label: Managed Comment
            hint: 'Comment added to all Cloudflare DNS records to indicate Terraform management.'
            widget: string

media_folder: media
