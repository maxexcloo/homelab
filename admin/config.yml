# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: maxexcloo/homelab
  branch: main
  base_url: https://sveltia-cms-auth.excloo.workers.dev

collections:
  - name: dns
    label: DNS
    extension: yml
    folder: data/dns
    format: yml
    identifier_field: name
    fields:
      - name: name
        label: DNS Zone (e.g. example.com)
        widget: string
      - name: records
        label: DNS Records
        required: false
        widget: list
        types:
          - name: A
            label: A Record
            fields:
              - name: name
                label: Name
                default: '@'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: Target IPv4
                widget: string
                pattern:
                  - ^(\d{1,3}\.){3}\d{1,3}$
                  - Must be a valid IPv4 address
              - name: proxied
                label: Proxied
                default: false
                widget: boolean
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
              - name: wildcard
                label: Wildcard
                default: false
                widget: boolean
          - name: AAAA
            label: AAAA Record
            fields:
              - name: name
                label: Name
                default: '@'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: Target IPv6
                widget: string
                pattern:
                  - ^([0-9a-fA-F:]+)$
                  - Must be a valid IPv6 address
              - name: proxied
                label: Proxied
                default: false
                widget: boolean
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
              - name: wildcard
                label: Wildcard
                default: false
                widget: boolean
          - name: CNAME
            label: CNAME Record
            fields:
              - name: name
                label: Name
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: Target
                widget: string
              - name: proxied
                label: Proxied
                default: false
                widget: boolean
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
              - name: wildcard
                label: Wildcard
                default: false
                widget: boolean
          - name: MX
            label: MX Record
            fields:
              - name: name
                label: Name
                default: '@'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: Mail Server
                widget: string
              - name: priority
                label: Priority
                default: 10
                value_type: int
                widget: number
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
          - name: NS
            label: NS Record
            fields:
              - name: name
                label: Name
                default: '@'
                widget: string
                pattern:
                  - ^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$
                  - Must be @, *, or a valid sub-domain
              - name: content
                label: Nameserver
                widget: string
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
          - name: SRV
            label: SRV Record
            fields:
              - name: name
                label: Name
                widget: string
              - name: content
                label: Target
                widget: string
              - name: priority
                label: Priority
                default: 10
                value_type: int
                widget: number
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number
          - name: TXT
            label: TXT Record
            fields:
              - name: name
                label: Name
                widget: string
                default: '@'
              - name: content
                label: Content
                widget: string
              - name: ttl
                label: TTL
                default: 1
                value_type: int
                widget: number

  - name: servers
    label: Servers
    extension: yml
    folder: data/servers
    format: yml
    identifier_field: id
    fields:
      - name: id
        label: Server ID
        hint: Derived from filename. Shows full hierarchical path.
        widget: string
        pattern:
          - ^[a-z]{2}(-[a-z0-9-]+)*$
          - 'Hierarchical: au, au-pie, au-pie-vm1'
      - name: name
        label: Server Name
        hint: Last segment of filename. For au-pie-truenas.yml, use 'truenas'
        widget: string
        pattern:
          - ^[a-z0-9-]+$
          - Must be lowercase alphanumeric with hyphens
      - name: parent
        label: Parent Server
        collection: servers
        hint: 'Select parent to build hierarchy. ID will be: parent-id + ''-'' + name'
        required: false
        value_field: id
        widget: relation
        display_fields:
          - id
      - name: region
        label: Region
        hint: First segment of ID (region code like 'au', 'us')
        widget: string
      - name: type
        label: Type
        default: server
        hint: Only routers have no parent. VMs and servers can have parents for hierarchical naming
        widget: select
        options:
          - vm
          - router
          - server
      - name: description
        label: Friendly Name
        required: false
        widget: string
      - name: platform
        label: Platform
        required: false
        widget: select
        options:
          - incus
          - oracle
          - physical
          - unifi
      - name: management_port
        label: Management Port
        default: 443
        required: false
        value_type: int
        widget: number
      - name: public_address
        label: Public Address
        required: false
        widget: string
        pattern:
          - ^$|^([a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$
          - Must be a valid FQDN or empty
      - name: public_ipv4
        label: Public IPv4
        required: false
        widget: string
        pattern:
          - ^$|^(\d{1,3}\.){3}\d{1,3}$
          - Must be a valid IPv4 address or empty
      - name: public_ipv6
        label: Public IPv6
        required: false
        widget: string
        pattern:
          - ^$|^([0-9a-fA-F:]+)$
          - Must be a valid IPv6 address or empty
      - name: username
        label: Username
        default: root
        required: false
        widget: string
      - name: enable_b2
        label: Enable B2
        default: false
        widget: boolean
      - name: enable_cloudflare_acme_token
        label: Enable Cloudflare ACME Token
        default: false
        widget: boolean
      - name: enable_cloudflare_proxy
        label: Enable Cloudflare Proxy
        default: false
        widget: boolean
      - name: enable_cloudflare_zero_trust_tunnel
        label: Enable Cloudflare Zero Trust Tunnel
        default: false
        widget: boolean
      - name: enable_docker
        label: Enable Docker
        default: false
        widget: boolean
      - name: enable_password
        label: Enable Password
        default: false
        widget: boolean
      - name: enable_resend
        label: Enable Resend
        default: false
        widget: boolean
      - name: enable_tailscale
        label: Enable Tailscale
        default: false
        widget: boolean

  - name: services
    label: Services
    extension: yml
    folder: data/services
    format: yml
    identifier_field: id
    fields:
      - name: id
        label: Service ID
        hint: Derived from filename. Shows full hierarchical path.
        widget: string
        pattern:
          - ^[a-z]{2}(-[a-z0-9-]+)*$
          - 'Hierarchical: au, au-pie, au-pie-vm1'
      - name: name
        label: Service Name (displayed in dashboard)
        widget: string
      - name: description
        label: Description
        required: false
        widget: string
      - name: service
        label: Service Config
        hint: Maps to your Docker config or application image
        required: false
        widget: string
      - name: icon
        label: Icon
        required: false
        widget: string
      - name: url
        label: External URL
        required: false
        widget: string
        pattern:
          - ^https?://[^\s]+$
          - Must be a valid URL starting with http:// or https://
      - name: port
        label: Internal Port
        required: false
        value_type: int
        widget: number
      - name: deploy_to
        label: Deploy To
        collection: servers
        multiple: true
        required: false
        value_field: name
        widget: relation
        display_fields:
          - name
        search_fields:
          - name
      - name: secrets
        label: Secrets to Generate
        multiple: true
        required: false
        widget: select
        options:
          - label: API Key
            value: api_key
          - label: Database Password
            value: database_password
          - label: Secret Hash
            value: secret_hash
      - name: enable_b2
        label: Enable B2
        default: false
        widget: boolean
      - name: enable_resend
        label: Enable Resend
        default: false
        widget: boolean
      - name: enable_tailscale
        label: Enable Tailscale
        default: false
        widget: boolean

  - name: settings
    label: Settings
    files:
      - name: defaults
        label: Defaults
        file: data/defaults.yml
        fields:
          - name: domain_acme
            label: ACME Domain
            widget: string
          - name: domain_external
            label: External Domain
            widget: string
          - name: domain_internal
            label: Internal Domain
            widget: string
          - name: email
            label: Admin Email
            widget: string
          - name: locale
            label: Locale
            widget: string
          - name: managed_comment
            label: Managed Comment
            widget: string
          - name: organization
            label: Organization Name
            widget: string
          - name: shell
            label: Default Shell
            widget: string
          - name: timezone
            label: Timezone
            widget: string

media_folder: media
