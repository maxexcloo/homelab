# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: maxexcloo/homelab
  branch: main
  base_url: https://sveltia-cms-auth.excloo.workers.dev

collections:
  - name: dns
    label: DNS
    extension: yml
    folder: data/dns
    format: yml
    identifier_field: name
    fields:
      - name: name
        label: DNS Zone (e.g. example.com)
        widget: string
      - name: records
        label: DNS Records
        required: false
        widget: list
        types:
          - name: A
            label: A Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Target IPv4, widget: string, pattern: ['^(\d{1,3}\.){3}\d{1,3}$', 'Must be a valid IPv4 address'], required: true }
              - { name: proxied, label: Proxied, widget: boolean, default: false, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
              - { name: wildcard, label: Wildcard, widget: boolean, default: false, required: true }
          - name: AAAA
            label: AAAA Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Target IPv6, widget: string, pattern: ['^([0-9a-fA-F:]+)$', 'Must be a valid IPv6 address'], required: true }
              - { name: proxied, label: Proxied, widget: boolean, default: false, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
              - { name: wildcard, label: Wildcard, widget: boolean, default: false, required: true }
          - name: CNAME
            label: CNAME Record
            fields:
              - { name: name, label: Name, widget: string, pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Target, widget: string, required: true }
              - { name: proxied, label: Proxied, widget: boolean, default: false, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
              - { name: wildcard, label: Wildcard, widget: boolean, default: false, required: true }
          - name: MX
            label: MX Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Mail Server, widget: string, required: true }
              - { name: priority, label: Priority, widget: number, value_type: int, default: 10, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
          - name: NS
            label: NS Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Nameserver, widget: string, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
          - name: SRV
            label: SRV Record
            fields:
              - { name: name, label: Name, widget: string, required: true }
              - { name: content, label: Target, widget: string, required: true }
              - { name: priority, label: Priority, widget: number, value_type: int, default: 10, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
          - name: TXT
            label: TXT Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", required: true }
              - { name: content, label: Content, widget: string, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
  - name: servers
    label: Servers
    extension: yml
    folder: data/servers
    format: yml
    identifier_field: id
    fields:
      - name: id
        label: Server ID
        hint: "Derived from filename. Shows full hierarchical path."
        pattern: ['^[a-z]{2}(-[a-z0-9-]+)*$', 'Hierarchical: au, au-pie, au-pie-vm1']
        widget: string
      - name: name
        label: Server Name
        hint: "Last segment of filename. For au-pie-truenas.yml, use 'truenas'"
        pattern: ['^[a-z0-9-]+$', 'Must be lowercase alphanumeric with hyphens']
        widget: string
      - name: parent
        label: Parent Server
        collection: servers
        display_fields: [id]
        hint: "Select parent to build hierarchy. ID will be: parent-id + '-' + name"
        required: false
        value_field: id
        widget: relation
      - name: region
        label: Region
        hint: "First segment of ID (region code like 'au', 'us')"
        widget: string
      - name: type
        label: Type
        default: "server"
        hint: "Only routers have no parent. VMs and servers can have parents for hierarchical naming"
        options: ["vm", "router", "server"]
        widget: select
      - name: description
        label: Friendly Name
        required: false
        widget: string
      - name: platform
        label: Platform
        options: ["incus", "oracle", "physical", "unifi"]
        required: false
        widget: select
      - name: management_port
        label: Management Port
        default: 443
        required: false
        value_type: int
        widget: number
      - name: public_address
        label: Public Address
        pattern: ['^$|^([a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$', 'Must be a valid FQDN or empty']
        required: false
        widget: string
      - name: public_ipv4
        label: Public IPv4
        pattern: ['^$|^(\d{1,3}\.){3}\d{1,3}$', 'Must be a valid IPv4 address or empty']
        required: false
        widget: string
      - name: public_ipv6
        label: Public IPv6
        pattern: ['^$|^([0-9a-fA-F:]+)$', 'Must be a valid IPv6 address or empty']
        required: false
        widget: string
      - name: username
        label: Username
        default: "root"
        required: false
        widget: string
      - name: enable_b2
        label: Enable B2
        default: false
        widget: boolean
      - name: enable_cloudflare_acme_token
        label: Enable Cloudflare ACME Token
        default: false
        widget: boolean
      - name: enable_cloudflare_proxy
        label: Enable Cloudflare Proxy
        default: false
        widget: boolean
      - name: enable_cloudflare_zero_trust_tunnel
        label: Enable Cloudflare Zero Trust Tunnel
        default: false
        widget: boolean
      - name: enable_docker
        label: Enable Docker
        default: false
        widget: boolean
      - name: enable_password
        label: Enable Password
        default: false
        widget: boolean
      - name: enable_resend
        label: Enable Resend
        default: false
        widget: boolean
      - name: enable_tailscale
        label: Enable Tailscale
        default: false
        widget: boolean

  - name: services
    label: Services
    folder: data/services
    extension: yml
    format: yml
    fields:
      - name: name
        label: Service Name (displayed in dashboard)
        widget: string
      - name: description
        label: Description
        widget: string
        required: false
      - name: service
        label: Service Config
        hint: Maps to your Docker config or application image
        widget: string
        required: false
      - name: icon
        label: Icon
        widget: string
        required: false
      - name: url
        label: External URL
        widget: string
        pattern: ['^https?://[^\s]+$', 'Must be a valid URL starting with http:// or https://']
        required: false
      - name: port
        label: Internal Port
        widget: number
        value_type: int
        required: false
      - name: deploy_to
        label: Deploy To
        widget: relation
        collection: servers
        search_fields: [name]
        display_fields: [name]
        value_field: name
        multiple: true
        required: false
      - name: secrets
        label: Secrets to Generate
        widget: select
        multiple: true
        options:
          - { label: "API Key", value: "api_key" }
          - { label: "Database Password", value: "database_password" }
          - { label: "Secret Hash", value: "secret_hash" }
        required: false
      - name: enable_b2
        label: Enable B2
        default: false
        widget: boolean
      - name: enable_resend
        label: Enable Resend
        default: false
        widget: boolean
      - name: enable_tailscale
        label: Enable Tailscale
        default: false
        widget: boolean

  - name: settings
    label: Settings
    files:
      - name: defaults
        label: Defaults
        file: data/defaults.yml
        fields:
          - name: domain_acme
            label: ACME Domain
            widget: string
          - name: domain_external
            label: External Domain
            widget: string
          - name: domain_internal
            label: Internal Domain
            widget: string
          - name: email
            label: Admin Email
            widget: string
          - name: locale
            label: Locale
            widget: string
          - name: managed_comment
            label: Managed Comment
            widget: string
          - name: organization
            label: Organization Name
            widget: string
          - name: shell
            label: Default Shell
            widget: string
          - name: timezone
            label: Timezone
            widget: string

media_folder: media
