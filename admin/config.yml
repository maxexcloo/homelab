# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  base_url: https://sveltia-cms-auth.excloo.workers.dev
  branch: main
  name: github
  repo: maxexcloo/homelab

collections:
  - name: dns
    extension: yml
    folder: data/dns
    format: yml
    identifier_field: name
    label: DNS Zones
    fields:
      - name: name
        label: Zone Name (e.g., excloo.com)
        widget: string
      - name: records
        label: DNS Records
        required: false
        widget: list
        fields:
          - name: content
            label: Content / Target
            widget: string
          - name: name
            label: Record Name (e.g., @ or sub)
            widget: string
          - name: priority
            label: Priority (MX/SRV only)
            required: false
            value_type: int
            widget: number
          - name: proxied
            default: false
            label: Proxied (Cloudflare)
            required: false
            widget: boolean
          - name: ttl
            default: 1
            label: TTL
            required: false
            value_type: int
            widget: number
          - name: type
            label: Record Type
            options:
              - A
              - AAAA
              - CNAME
              - MX
              - NS
              - SRV
              - TXT
            widget: select
          - name: wildcard
            default: false
            label: Wildcard Record
            required: false
            widget: boolean
  - name: servers
    extension: yml
    folder: data/servers
    format: yml
    identifier_field: name
    label: Servers
    fields:
      - name: name
        label: Server Name
        widget: string
      - name: description
        label: Description
        required: false
        widget: string
      - name: enable_b2
        default: false
        label: Enable B2
        required: false
        widget: boolean
      - name: enable_cloudflare
        default: false
        label: Enable Cloudflare
        required: false
        widget: boolean
      - name: enable_cloudflared
        default: false
        label: Enable Cloudflared
        required: false
        widget: boolean
      - name: enable_docker
        default: false
        label: Enable Docker
        required: false
        widget: boolean
      - name: enable_resend
        default: false
        label: Enable Resend
        required: false
        widget: boolean
      - name: enable_tailscale
        default: false
        label: Enable Tailscale
        required: false
        widget: boolean
      - name: management_port
        label: Management Port
        required: false
        value_type: int
        widget: number
      - name: parent
        collection: servers
        display_fields: [name]
        label: Parent Server
        required: false
        search_fields: [name]
        value_field: name
        widget: relation
      - name: platform
        label: Platform
        required: false
        widget: string
      - name: public_address
        label: Public Address
        required: false
        widget: string
      - name: public_ipv4
        label: Public IPv4
        pattern: ['^(\d{1,3}\.){3}\d{1,3}$', 'Must be a valid IPv4 address']
        required: false
        widget: string
      - name: public_ipv6
        label: Public IPv6
        required: false
        widget: string
      - name: region
        default: au
        label: Region
        widget: string
  - name: services
    extension: yml
    folder: data/services
    format: yml
    identifier_field: name
    label: Services
    fields:
      - name: name
        label: Service Name
        widget: string
      - name: service
        label: Service Type / Platform
        required: false
        widget: string
      - name: description
        label: Description
        required: false
        widget: string
      - name: deploy_to
        collection: servers
        display_fields: [name]
        label: Deploy To
        multiple: true
        required: false
        search_fields: [name]
        value_field: name
        widget: relation
      - name: enable_api_key
        default: false
        label: Generate API Key
        required: false
        widget: boolean
      - name: enable_b2
        default: false
        label: Enable B2
        required: false
        widget: boolean
      - name: enable_database_password
        default: false
        label: Generate Database Password
        required: false
        widget: boolean
      - name: enable_resend
        default: false
        label: Enable Resend
        required: false
        widget: boolean
      - name: enable_secret_hash
        default: false
        label: Generate Secret Hash
        required: false
        widget: boolean
      - name: enable_tailscale
        default: false
        label: Enable Tailscale
        required: false
        widget: boolean
      - name: icon
        label: Icon
        required: false
        widget: string
      - name: port
        label: Internal Port
        required: false
        value_type: int
        widget: number
      - name: url
        label: External URL
        required: false
        widget: string
  - name: settings
    label: Global Settings
    files:
      - name: defaults
        label: Terraform Defaults
        file: data/defaults.yml
        fields:
          - name: domain_acme
            label: ACME Domain
            widget: string
          - name: domain_external
            label: External Domain
            widget: string
          - name: domain_internal
            label: Internal Domain
            widget: string
          - name: email
            label: Admin Email
            widget: string
          - name: locale
            label: Locale
            widget: string
          - name: managed_comment
            label: Managed Comment
            widget: string
          - name: organization
            label: Organization Name
            widget: string
          - name: shell
            label: Default Shell
            widget: string
          - name: timezone
            label: Timezone
            widget: string

media_folder: media
