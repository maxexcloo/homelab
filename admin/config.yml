# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: maxexcloo/homelab
  branch: main
  base_url: https://sveltia-cms-auth.excloo.workers.dev

collections:
  - name: dns
    label: DNS Zones
    identifier_field: name
    folder: data/dns
    extension: yml
    format: yml
    fields:
      - name: name
        label: Zone Name (e.g., excloo.com)
        widget: string
      - name: records
        label: DNS Records
        widget: list
        required: false
        typeKey: type
        types:
          - name: A
            label: A Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Target IPv4, widget: string, pattern: ['^(\d{1,3}\.){3}\d{1,3}$', 'Must be a valid IPv4 address'], required: true }
              - { name: proxied, label: Proxied, widget: boolean, default: false, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
              - { name: wildcard, label: Wildcard, widget: boolean, default: false, required: true }
          
          - name: AAAA
            label: AAAA Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Target IPv6, widget: string, pattern: ['^([0-9a-fA-F:]+)$', 'Must be a valid IPv6 address'], required: true }
              - { name: proxied, label: Proxied, widget: boolean, default: false, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
              - { name: wildcard, label: Wildcard, widget: boolean, default: false, required: true }
          
          - name: CNAME
            label: CNAME Record
            fields:
              - { name: name, label: Name, widget: string, pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Target, widget: string, required: true }
              - { name: proxied, label: Proxied, widget: boolean, default: false, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
              - { name: wildcard, label: Wildcard, widget: boolean, default: false, required: true }
          
          - name: MX
            label: MX Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Mail Server, widget: string, required: true }
              - { name: priority, label: Priority, widget: number, value_type: int, default: 10, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
          
          - name: NS
            label: NS Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", pattern: ['^(@|\*|(\*\.)?[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?(\.[_a-zA-Z0-9]([_a-zA-Z0-9\-]{0,61}[_a-zA-Z0-9])?)*)$', 'Must be @, *, or a valid sub-domain'], required: true }
              - { name: content, label: Nameserver, widget: string, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }
              
          - name: SRV
            label: SRV Record
            fields:
              - { name: name, label: Name, widget: string, required: true }
              - { name: content, label: Target, widget: string, required: true }
              - { name: priority, label: Priority, widget: number, value_type: int, default: 10, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }

          - name: TXT
            label: TXT Record
            fields:
              - { name: name, label: Name, widget: string, default: "@", required: true }
              - { name: content, label: Content, widget: string, required: true }
              - { name: ttl, label: TTL, widget: number, value_type: int, default: 1, required: true }

  - name: servers
    label: Servers
    identifier_field: name
    folder: data/servers
    extension: yml
    format: yml
    fields:
      - name: name
        label: Machine Name / Slug
        widget: string
        pattern: ['^[a-z0-9]([-a-z0-9]*[a-z0-9])?$', 'Must be lowercase alphanumeric, dashes allowed']
      - name: description
        label: Friendly Name
        widget: string
        required: false
      - name: parent
        label: Parent Server
        widget: relation
        collection: servers
        search_fields: [name]
        display_fields: [name]
        value_field: name
        required: false
      - name: platform
        label: Platform
        widget: string
        required: false
      - name: region
        label: Region
        widget: string
        default: au
        required: true
      - name: public_address
        label: Public Address (Leave blank if inheriting)
        widget: string
        pattern: ['^([a-zA-Z0-9]([a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])?\.)+[a-zA-Z]{2,}$', 'Must be a valid FQDN']
        required: false
      - name: public_ipv4
        label: Public IPv4 (Leave blank if inheriting)
        widget: string
        pattern: ['^(\d{1,3}\.){3}\d{1,3}$', 'Must be a valid IPv4 address']
        required: false
      - name: public_ipv6
        label: Public IPv6 (Leave blank if inheriting)
        widget: string
        pattern: ['^([0-9a-fA-F:]+)$', 'Must be a valid IPv6 address']
        required: false
      - name: management_port
        label: Management Port
        widget: number
        value_type: int
        required: false
      - name: enable_b2
        label: Enable B2
        widget: boolean
        default: false
        required: true
      - name: enable_cloudflare
        label: Enable Cloudflare
        widget: boolean
        default: false
        required: true
      - name: enable_cloudflared
        label: Enable Cloudflared
        widget: boolean
        default: false
        required: true
      - name: enable_docker
        label: Enable Docker
        widget: boolean
        default: false
        required: true
      - name: enable_resend
        label: Enable Resend
        widget: boolean
        default: false
        required: true
      - name: enable_tailscale
        label: Enable Tailscale
        widget: boolean
        default: false
        required: true

  - name: services
    label: Services
    identifier_field: name
    folder: data/services
    extension: yml
    format: yml
    fields:
      - name: name
        label: Friendly Machine Name
        widget: string
      - name: description
        label: Friendly Description
        widget: string
        required: false
      - name: service
        label: Service Config
        hint: Maps to your Docker config or application image
        widget: string
        required: false
      - name: icon
        label: Icon
        widget: string
        required: false
      - name: url
        label: External URL
        widget: string
        pattern: ['^https?://[^\s]+$', 'Must be a valid URL starting with http:// or https://']
        required: false
      - name: port
        label: Internal Port
        widget: number
        value_type: int
        required: false
      - name: deploy_to
        label: Deploy To
        widget: relation
        collection: servers
        search_fields: [name]
        display_fields: [name]
        value_field: name
        multiple: true
        required: false
      - name: enable_api_key
        label: Generate API Key
        widget: boolean
        default: false
        required: true
      - name: enable_b2
        label: Enable B2
        widget: boolean
        default: false
        required: true
      - name: enable_database_password
        label: Generate Database Password
        widget: boolean
        default: false
        required: true
      - name: enable_resend
        label: Enable Resend
        widget: boolean
        default: false
        required: true
      - name: enable_secret_hash
        label: Generate Secret Hash
        widget: boolean
        default: false
        required: true
      - name: enable_tailscale
        label: Enable Tailscale
        widget: boolean
        default: false
        required: true

  - name: settings
    label: Global Settings
    files:
      - name: defaults
        label: Terraform Defaults
        file: data/defaults.yml
        fields:
          - name: organization
            label: Organization Name
            widget: string
          - name: email
            label: Admin Email
            widget: string
          - name: domain_external
            label: External Domain
            widget: string
          - name: domain_internal
            label: Internal Domain
            widget: string
          - name: domain_acme
            label: ACME Domain
            widget: string
          - name: locale
            label: Locale
            widget: string
          - name: timezone
            label: Timezone
            widget: string
          - name: shell
            label: Default Shell
            widget: string
          - name: managed_comment
            label: Managed Comment
            widget: string

media_folder: media
